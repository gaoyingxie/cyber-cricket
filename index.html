<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博斗龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            min-height: 100vh;
            color: #00ff88;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .title {
            text-align: center;
            font-size: 2.5em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin: 20px 0;
            animation: glitch 3s infinite;
        }
        .version { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat { text-align: center; min-width: 80px; }
        .stat-label { font-size: 0.8em; color: #888; }
        .stat-value { font-size: 1.4em; color: #00ff88; }
        .stamina-wrap { margin-bottom: 20px; }
        .stamina-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .stamina-label { font-size: 0.85em; color: #aaa; min-width: 50px; }
        .stamina-bar { flex: 1; background: #222; border-radius: 8px; height: 14px; overflow: hidden; border: 1px solid #333; }
        .stamina-fill { height: 100%; background: linear-gradient(90deg, #4488ff, #66aaff); transition: width 0.3s; }
        .stamina-text { font-size: 0.8em; color: #888; text-align: right; }
        .arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }
        .arena::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.03) 2px, rgba(0,255,136,0.03) 4px);
            pointer-events: none;
        }
        .fighter { text-align: center; width: 45%; position: relative; z-index: 1; transition: transform 0.2s; }
        .fighter-sprite { font-size: 80px; margin-bottom: 10px; transition: all 0.3s; position: relative; }
        .fighter-name { font-size: 1.2em; color: #fff; margin-bottom: 5px; }
        .fighter-level { font-size: 0.9em; color: #aaa; margin-bottom: 10px; }
        .hp-bar { background: #333; border-radius: 10px; height: 20px; overflow: hidden; margin-bottom: 5px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); transition: width 0.3s; }
        .hp-fill.green { background: linear-gradient(90deg, #00ff88, #00cc66); }
        .hp-text { font-size: 0.85em; color: #888; }
        .fighter-stats { font-size: 0.8em; color: #00ff88; margin-top: 5px; }
        .buffs-display { min-height: 24px; margin-top: 6px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        .buff-tag { display: inline-block; font-size: 0.7em; padding: 2px 6px; border-radius: 6px; margin: 2px; }
        .buff-poison { background: rgba(128,255,0,0.15); border: 1px solid #80ff00; color: #80ff00; }
        .buff-shield { background: rgba(68,136,255,0.15); border: 1px solid #4488ff; color: #4488ff; }
        .buff-stun { background: rgba(255,200,0,0.15); border: 1px solid #ffc800; color: #ffc800; }
        .buff-seal { background: rgba(180,80,255,0.15); border: 1px solid #b450ff; color: #b450ff; }
        .buff-speed { background: rgba(255,100,50,0.15); border: 1px solid #ff6432; color: #ff6432; }
        .buff-defend { background: rgba(100,180,255,0.15); border: 1px solid #64b4ff; color: #64b4ff; }
        .buff-counter { background: rgba(255,150,50,0.15); border: 1px solid #ff9632; color: #ff9632; }
        .vs { font-size: 2em; color: #ff4444; text-shadow: 0 0 10px #ff4444; animation: pulse 1s infinite; position: relative; z-index: 1; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        
        /* 战斗特效 */
        .damage-number {
            position: fixed;
            font-size: 1.8em;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000, 2px 2px 0 #000;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            z-index: 1000;
        }
        .damage-number.crit {
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00, 0 0 40px #ff8800, 2px 2px 0 #000;
            font-size: 2.4em;
        }
        .damage-number.heal {
            color: #00ff88;
            text-shadow: 0 0 10px #00ff00, 2px 2px 0 #000;
        }
        .damage-number.poison {
            color: #80ff00;
            text-shadow: 0 0 10px #80ff00, 2px 2px 0 #000;
        }
        .damage-number.stun {
            color: #ffc800;
            text-shadow: 0 0 10px #ffc800, 2px 2px 0 #000;
        }
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        @keyframes attackRight {
            0% { transform: translateX(0); }
            30% { transform: translateX(50px) scale(1.1); }
            60% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }
        @keyframes attackLeft {
            0% { transform: translateX(0); }
            30% { transform: translateX(-50px) scale(1.1); }
            60% { transform: translateX(-20px); }
            100% { transform: translateX(0); }
        }
        @keyframes hitFlash {
            0%, 100% { filter: brightness(1); }
            25% { filter: brightness(2) hue-rotate(30deg); }
            50% { filter: brightness(0.5); }
            75% { filter: brightness(1.5); }
        }
        @keyframes critEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(2) hue-rotate(45deg); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes resurrection {
            0% { transform: scale(0.5); opacity: 0; filter: brightness(0); }
            50% { transform: scale(1.5); opacity: 1; filter: brightness(3) hue-rotate(120deg); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }
        .attacking-right { animation: attackRight 0.4s ease-out !important; }
        .attacking-left { animation: attackLeft 0.4s ease-out !important; }
        .hit-flash { animation: hitFlash 0.3s ease-out !important; }
        .crit-effect { animation: critEffect 0.5s ease-out !important; }
        .resurrect-effect { animation: resurrection 0.8s ease-out !important; }
        
        .skills-section {
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .skills-title { font-size: 1em; color: #00ff88; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .skill-btn {
            background: linear-gradient(135deg, #1a3a2a, #0a2a1a);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
            color: #00ff88;
            font-family: inherit;
            text-align: left;
            position: relative;
        }
        .skill-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2a5a3a, #1a4a2a);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
            transform: translateY(-2px);
        }
        .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .skill-btn .skill-name { font-weight: bold; display: block; }
        .skill-btn .skill-cost { font-size: 0.75em; color: #888; }
        .skill-btn .skill-desc { font-size: 0.7em; color: #aaa; margin-top: 3px; }
        .skill-btn.attack { border-color: #ff6644; color: #ff6644; background: linear-gradient(135deg, #3a2a1a, #2a1a0a); }
        .skill-btn.defense { border-color: #4488ff; color: #4488ff; background: linear-gradient(135deg, #1a2a3a, #0a1a2a); }
        .skill-btn.special { border-color: #ff44ff; color: #ff44ff; background: linear-gradient(135deg, #2a1a2a, #1a0a1a); }
        .skill-btn.no-stamina { opacity: 0.3; border-color: #666 !important; }
        .battle-log {
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry { font-size: 0.9em; padding: 5px 0; border-bottom: 1px solid #222; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-player { color: #00ff88; }
        .log-enemy { color: #ff6644; }
        .log-damage { color: #ff4444; }
        .log-heal { color: #44ff44; }
        .log-crit { color: #ffff00; text-shadow: 0 0 5px #ffff00; }
        .log-system { color: #888; }
        .log-turn { color: #00ccff; font-weight: bold; }
        .btn {
            background: linear-gradient(135deg, #00aa55, #008844);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 1.1em;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #00cc66, #00aa55);
            box-shadow: 0 0 20px rgba(0,255,136,0.4);
            transform: translateY(-2px);
        }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background: linear-gradient(135deg, #aa0000, #880000); }
        .btn-warning { background: linear-gradient(135deg, #ff8800, #cc6600); }
        .btn-small { padding: 8px 15px; font-size: 0.9em; }
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        
        .auto-battle-indicator {
            display: none;
            background: linear-gradient(135deg, #ff6600, #ff4400);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
            animation: autoPulse 1s infinite;
        }
        .auto-battle-indicator.active { display: block; }
        @keyframes autoPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,102,0,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,102,0,0.8); }
        }
        
        .evolution-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .evolution-overlay.show { display: flex; }
        .evolution-text { font-size: 2em; color: #00ff88; text-shadow: 0 0 30px #00ff88; animation: evolveText 2s; }
        @keyframes evolveText { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .game-over {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .game-over.show { display: flex; }
        .welcome-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            display: none;
            z-index: 1000;
            min-width: 380px;
            text-align: center;
        }
        .welcome-panel.show { display: block; }
        .welcome-title { font-size: 1.8em; color: #00ff88; margin-bottom: 20px; text-shadow: 0 0 20px #00ff88; }
        .welcome-content { text-align: left; margin-bottom: 15px; }
        .welcome-content p { margin: 8px 0; font-size: 1.1em; color: #fff; }
        .welcome-content strong { color: #ff6644; }
        .lobster-reveal { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; border-radius: 10px; padding: 15px; margin: 15px 0; text-align: center; }
        .lobster-reveal-title { font-size: 1.1em; color: #00ff88; margin-bottom: 10px; }
        .lobster-reveal-sprite { font-size: 4em; margin: 10px 0; animation: lobsterPulse 2s infinite; }
        @keyframes lobsterPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .lobster-reveal-name { font-size: 1.2em; color: #fff; margin-bottom: 8px; }
        .lobster-reveal-skills { font-size: 0.95em; color: #aaa; }
        .game-over h2 { font-size: 3em; margin-bottom: 20px; }
        .game-over.win h2 { color: #00ff88; text-shadow: 0 0 30px #00ff88; }
        .game-over.lose h2 { color: #ff4444; text-shadow: 0 0 30px #ff4444; }
        .game-over p { margin: 10px 0; font-size: 1.2em; }
        .reward-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            display: none;
            z-index: 999;
            min-width: 350px;
            text-align: center;
        }
        .reward-panel.show { display: block; }
        .reward-title { font-size: 1.5em; color: #00ff88; margin-bottom: 20px; }
        .reward-item { margin: 10px 0; font-size: 1.1em; }
        .reward-skill { background: rgba(255,68,255,0.2); border: 1px solid #ff44ff; border-radius: 8px; padding: 10px; margin: 10px 0; color: #ff44ff; }
        .enemy-select-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border: 2px solid #ff6644;
            border-radius: 15px;
            padding: 30px;
            display: none;
            z-index: 999;
            min-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            text-align: center;
        }
        .enemy-select-panel.show { display: block; }
        .enemy-select-title { font-size: 1.5em; color: #ff6644; margin-bottom: 20px; }
        .enemy-select-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .enemy-option {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .enemy-option:hover { background: rgba(255,102,68,0.2); border-color: #ff6644; }
        .enemy-option-name { font-size: 1.1em; color: #fff; margin-bottom: 5px; }
        .enemy-option-stats { font-size: 0.85em; color: #888; }
        .enemy-option-skills { font-size: 0.8em; color: #00ff88; margin-top: 5px; }
        .player-skill-display { font-size: 0.75em; color: #888; margin-top: 5px; }
        .enemy-skill-display { font-size: 0.75em; color: #888; margin-top: 5px; }
        .skill-item { cursor: pointer; padding: 2px 6px; border-radius: 4px; background: rgba(0,255,136,0.1); transition: background 0.2s; }
        .skill-item:hover { background: rgba(0,255,136,0.3); }
        .skill-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 25px;
            display: none;
            z-index: 1002;
            min-width: 300px;
            text-align: center;
        }
        .skill-popup.show { display: block; }
        .skill-popup-backdrop {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1001;
        }
        .skill-popup-backdrop.show { display: block; }
        .skill-tooltip {
            position: absolute;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 0.85em;
            color: #fff;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1003;
            display: none;
        }
        .skill-tooltip.show { display: block; }
        .skill-tooltip-name { color: #00ff88; font-weight: bold; margin-bottom: 5px; }
        .skill-tooltip-desc { color: #aaa; }
        .skill-popup-icon { font-size: 3em; margin-bottom: 10px; }
        .skill-popup-name { font-size: 1.5em; color: #fff; margin-bottom: 10px; }
        .skill-popup-type { font-size: 0.9em; color: #888; margin-bottom: 5px; }
        .skill-popup-cost { font-size: 1em; color: #4488ff; margin-bottom: 10px; }
        .skill-popup-desc { font-size: 1.1em; color: #00ff88; margin-bottom: 15px; }
        .skill-popup-effect { font-size: 0.9em; color: #aaa; }
        .skill-popup-close { margin-top: 15px; font-size: 0.9em; color: #666; }
        .speed-indicator {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7em;
            color: #aaa;
            white-space: nowrap;
        }
        .speed-bar-container {
            width: 80%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 5px auto 0;
            overflow: hidden;
        }
        .speed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .arena { flex-direction: column; gap: 20px; padding: 15px; }
            .fighter { width: 100%; }
            .vs { margin: 10px 0; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">⚡ 赛博斗龙虾 ⚡</h1>
        <div class="version">v1.19 | 第 <span id="round-num">1</span> 轮</div>
        <div class="status-bar">
            <div class="stat"><div class="stat-label">金币</div><div class="stat-value" id="gold">0</div></div>
            <div class="stat"><div class="stat-label">经验</div><div class="stat-value" id="exp">0/30</div></div>
            <div class="stat"><div class="stat-label">阶别</div><div class="stat-value" id="phase">幼虫</div></div>
            <div class="stat"><div class="stat-label">等级</div><div class="stat-value" id="level">1</div></div>
        </div>
        <div class="stamina-wrap">
            <div class="stamina-row">
                <span class="stamina-label">⚡ 体力</span>
                <div class="stamina-bar"><div class="stamina-fill" id="stamina-bar" style="width:100%"></div></div>
                <span class="stamina-text" id="stamina-text">100/100</span>
            </div>
            <div class="stamina-row">
                <span class="stamina-label" style="color:#555;font-size:0.75em">每回合恢复 +15（战斗外+30）</span>
            </div>
        </div>
        <div class="auto-battle-indicator active" id="auto-indicator"></div>
        <div class="arena" id="arena">
            <div class="fighter" id="player-fighter">
                <div class="fighter-sprite" id="player-sprite">🐛</div>
                <div class="fighter-name" id="player-name">你的龙虾</div>
                <div class="fighter-level" id="player-level">Lv.1</div>
                <div class="hp-bar"><div class="hp-fill" id="player-hp-bar"></div></div>
                <div class="hp-text"><span id="player-hp">100</span> / <span id="player-max-hp">100</span></div>
                <div class="fighter-stats" id="player-stats">攻:10 防:5 速:8</div>
                <div class="player-skill-display" id="player-skills"></div>
                <div class="buffs-display" id="player-buffs"></div>
                <div class="speed-indicator">速度</div>
                <div class="speed-bar-container"><div class="speed-bar-fill" id="player-speed-bar" style="width:50%"></div></div>
            </div>
            <div class="vs">VS</div>
            <div class="fighter" id="enemy-fighter">
                <div class="fighter-sprite" id="enemy-sprite">🤖</div>
                <div class="fighter-name" id="enemy-name">???</div>
                <div class="fighter-level" id="enemy-level"></div>
                <div class="hp-bar"><div class="hp-fill" id="enemy-hp-bar"></div></div>
                <div class="hp-text"><span id="enemy-hp">0</span> / <span id="enemy-max-hp">0</span></div>
                <div class="fighter-stats" id="enemy-stats"></div>
                <div class="buffs-display" id="enemy-buffs"></div>
                <div class="enemy-skill-display" id="enemy-skills"></div>
                <div class="speed-indicator">速度</div>
                <div class="speed-bar-container"><div class="speed-bar-fill" id="enemy-speed-bar" style="width:50%"></div></div>
            </div>
        </div>

        <div class="skill-popup-type" id="skill-popup-type"></div>
        <div class="skill-popup-cost" id="skill-popup-cost"></div>
        <div class="skill-popup-desc" id="skill-popup-desc"></div>
        <div class="skill-popup-effect" id="skill-popup-effect"></div>

        <div class="skill-tooltip-name" id="skill-tooltip-name"></div>

        <div class="welcome-title">🎮 欢迎来到赛博斗龙虾!</div>
        <div class="welcome-content">
            <p>⏱️ 游戏共 <strong>5轮</strong> 战斗</p>
            <p>⚔️ 每次<strong>战胜</strong>可偷取对手<strong>1个技能</strong></p>
            <p>🌀 消耗金币可<strong>进化</strong>龙虾属性</p>
        </div>
        <div class="lobster-reveal">
            <div class="lobster-reveal-title">🎰 这是你的随机初始小龙虾!</div>
            <div class="lobster-reveal-sprite" id="welcome-sprite">🦐</div>
            <div class="lobster-reveal-name">你的龙虾</div>
            <div class="lobster-reveal-skills" id="welcome-skills">技能加载中...</div>

        <h2 id="game-over-title">游戏结束</h2>
        <p id="game-over-msg"></p>
        <p>达到回合: <span id="final-round">0</span></p>
        <button class="btn" onclick="restartGame()" style="margin-top:20px">🔄 重新开始</button>
    </div>
<script>
const VERSION = 'v1.19';
const PHASES=['虾苗','幼虾','战斗虾','究极虾'], PHASE_SPRITES=['🦐','🦞','⚡🦞','🔱🦞'], PHASE_STAT_MULT=[1,1.3,1.7,2.3];
const ALL_SKILLS=[
    {id:'combo',name:'连击',staminaCost:15,type:'attack',desc:'【主动】连续攻击2次',minDmg:0.6,times:2,icon:'👊',cd:0},
    {id:'crit',name:'暴击',staminaCost:12,type:'attack',desc:'【主动】高概率暴击',minDmg:0,critRate:0.45,critMult:2,icon:'💥',cd:0},
    {id:'lifesteal',name:'吸血',staminaCost:18,type:'attack',desc:'【被动】伤害30%转HP',minDmg:0.8,lifesteal:0.3,icon:'🩸',cd:0,passive:true},
    {id:'resurrect',name:'神佑',staminaCost:25,type:'special',desc:'【被动】死亡30%复活',resurrectRate:0.3,icon:'✨',cd:0,passive:true},
    {id:'counter',name:'反击',staminaCost:10,type:'defense',desc:'【被动】受击时反击',counterRate:0.4,icon:'🛡️',cd:0,passive:true},
    {id:'poison',name:'剧毒',staminaCost:14,type:'attack',desc:'【主动】每回合掉血5%',minDmg:0.5,poisonDmg:0.05,icon:'☠️',cd:0},
    {id:'deadly',name:'必杀',staminaCost:22,type:'attack',desc:'【主动】2.5倍伤害',minDmg:0,critRate:1,critMult:2.5,icon:'⚔️',cd:0},
    {id:'defend',name:'防御',staminaCost:8,type:'defense',desc:'【主动】受伤-50%',reduceDmg:0.5,icon:'🛡️',cd:1},
    {id:'confuse',name:'混乱',staminaCost:16,type:'special',desc:'【主动】敌无法行动',stunRate:0.35,icon:'🌪️',cd:2},
    {id:'seal',name:'封印',staminaCost:20,type:'special',desc:'【主动】封印1回合',sealRate:0.3,icon:'🔮',cd:2},
    {id:'emp',name:'电磁脉冲',staminaCost:15,type:'special',desc:'【主动】伤害+沉默',minDmg:0.7,stunRate:0.25,icon:'⚡',cd:0},
    {id:'hack',name:'数据入侵',staminaCost:18,type:'attack',desc:'【主动】窃取10%HP',minDmg:0.6,drain:0.1,icon:'💻',cd:0},
    {id:'shield',name:'能量护盾',staminaCost:12,type:'defense',desc:'【主动】抵2次攻击',shield:2,icon:'🔰',cd:2},
    {id:'virus',name:'病毒注入',staminaCost:20,type:'attack',desc:'【主动】持续伤害',minDmg:0.4,poisonDmg:0.08,reduceStat:0.1,icon:'🦠',cd:0},
    {id:'overclock',name:'超频',staminaCost:10,type:'special',desc:'【被动】速度翻倍',speedBoost:true,icon:'🔥',cd:2,passive:true},
    {id:'shield_break',name:'护盾击破',staminaCost:14,type:'attack',desc:'【主动】无视防御',minDmg:1.2,ignoreDef:true,icon:'💎',cd:1},
];
const ENEMY_NAMES=['机械龙虾','电路龙虾','芯片龙虾','程序龙虾','数据龙虾','比特龙虾','代码龙虾','网络龙虾','云端龙虾','量子龙虾','深渊机甲龙虾','泰坦机械龙虾','风暴电子龙虾','雷霆硅基龙虾','混沌编程龙虾'];
const MAX_STAMINA = 100;
const STAMINA_REGEN_BATTLE = 15;
const STAMINA_REGEN_IDLE = 30;
const AUTO_BATTLE_DELAY = 300;
let S={round:1,gold:0,phase:0,turn:0,inBattle:false,battleResult:null,player:null,enemy:null,pendingEnemySkill:null,turnOrder:null,battleSpeed:1,playerCooldowns:{},enemyCooldowns:{},battleQueue:[],isProcessing:false};

function initState(){
    const oldSpeed=S.battleSpeed||1;
    S={round:1,gold:0,phase:0,turn:0,inBattle:false,battleResult:null,pendingEnemySkill:null,turnOrder:null,battleSpeed:oldSpeed,
        player:{
            name:'你的龙虾',level:1,exp:0,expToLevel:30,hp:100,maxHp:100,atk:8,def:5,spd:8,
            stamina:MAX_STAMINA,maxStamina:MAX_STAMINA,
            skills:[Object.assign({},ALL_SKILLS[Math.floor(Math.random()*ALL_SKILLS.length)]),Object.assign({},ALL_SKILLS[Math.floor(Math.random()*ALL_SKILLS.length)])],
            buffs:[],shields:0,poisonDmg:0,alive:true,resurrectUsed:false,stunned:false,sealed:false,
            speedBoosted:false,defReduced:false,resurrectRate:0,counterRate:0,reduceDmgRate:0,lifesteal:0
        },enemy:null};
}
function cloneSkill(s){return JSON.parse(JSON.stringify(s))}
function getPhaseMult(){return PHASE_STAT_MULT[S.phase]}
function calcPlayerStats(){
    const m=getPhaseMult(),bhp=100+(S.player.level-1)*15,bAtk=8+(S.player.level-1)*2;
    const bDef=4+(S.player.level-1)*1,bSpd=6+(S.player.level-1)*1;
    const hpM=S.player.defReduced?0.9:1,atkM=S.player.defReduced?0.9:1;
    S.player.maxHp=Math.floor(bhp*m*hpM);
    S.player.atk=Math.floor(bAtk*m*atkM);
    S.player.def=Math.floor(bDef*m);
    const effectiveSpd=S.player.speedBoosted?bSpd*m*2:bSpd*m;
    S.player.spd=Math.floor(effectiveSpd);
    if(S.player.hp>S.player.maxHp)S.player.hp=S.player.maxHp;
}
function levelUp(){
    while(S.player.exp>=S.player.expToLevel){
        S.player.exp-=S.player.expToLevel;
        S.player.level++;
        S.player.expToLevel=Math.floor(S.player.expToLevel*1.4);
        calcPlayerStats();
        S.player.hp=S.player.maxHp;
        addLog('<span class="log-player">🎉 升级了! Lv.'+S.player.level+'</span>');
    }
}
function generateEnemy(){
    const r=S.round,m=1+(r-1)*0.15;
    const e={
        name:ENEMY_NAMES[Math.min(r-1,ENEMY_NAMES.length-1)]||'强化龙虾#'+r,
        level:r,hp:Math.floor((100+r*15)*m),maxHp:Math.floor((100+r*15)*m),
        atk:Math.floor((6+r*1.2)*m),def:Math.floor((3+r*0.8)*m),spd:Math.floor((5+r*0.6)*m),
        stamina:MAX_STAMINA,maxStamina:MAX_STAMINA,
        skills:[],buffs:[],shields:0,poisonDmg:0,alive:true,resurrected:false,
        stunned:false,sealed:false,resurrectRate:0,counterRate:0,reduceDmgRate:0,
        speedBoosted:false,defReduced:false
    };
    const cnt=3+Math.min(Math.floor(r/3),4);
    const avail=ALL_SKILLS.filter(x=>x.id!=='resurrect'||Math.random()<0.2);
    const sh=[...avail].sort(()=>Math.random()-0.5);
    for(let i=0;i<Math.min(cnt,sh.length);i++) e.skills.push(cloneSkill(sh[i]));
    S.enemy=e;
}

// 特效函数
function showDamageNumber(element, value, type) {
    const rect = element.getBoundingClientRect();
    const dmgEl = document.createElement('div');
    dmgEl.className = 'damage-number ' + type;
    dmgEl.textContent = (type === 'heal' ? '+' : '-') + value;
    dmgEl.style.left = (rect.left + rect.width / 2 - 30 + Math.random() * 20 - 10) + 'px';
    dmgEl.style.top = (rect.top + 40) + 'px';
    document.body.appendChild(dmgEl);
    setTimeout(() => dmgEl.remove(), 1000);
}

function playAttackAnimation(attackerId, targetId, isCrit) {
    const attacker = document.getElementById(attackerId);
    const target = document.getElementById(targetId);
    const animClass = attackerId === 'player-fighter' ? 'attacking-right' : 'attacking-left';
    
    attacker.classList.add(animClass);
    setTimeout(() => {
        attacker.classList.remove(animClass);
        if (target) {
            target.classList.add('hit-flash');
            if (isCrit) {
                target.classList.add('crit-effect');
                setTimeout(() => target.classList.remove('crit-effect'), 500);
            }
            setTimeout(() => target.classList.remove('hit-flash'), 300);
        }
    }, 300);
}

function playResurrectAnimation(element) {
    element.classList.add('resurrect-effect');
    setTimeout(() => element.classList.remove('resurrect-effect'), 800);
}

function showSkillPopup(skillId) {
    const skill=ALL_SKILLS.find(s=>s.id===skillId);
    if(!skill) return;
    document.getElementById('skill-popup-icon').textContent=skill.icon;
    document.getElementById('skill-popup-name').textContent=skill.name;
    document.getElementById('skill-popup-type').textContent='类型: '+(skill.type==='attack'?'攻击':skill.type==='defense'?'防御':'特殊');
    document.getElementById('skill-popup-cost').textContent='消耗: '+skill.staminaCost+' 体力';
    document.getElementById('skill-popup-desc').textContent=skill.desc;
    let effect='';
    if(skill.minDmg>0) effect+='伤害倍率'+(skill.minDmg*100).toFixed(0)+'%';
    if(skill.critRate) effect+=(effect?' | ':'')+'暴击率'+(skill.critRate*100).toFixed(0)+'%'+(skill.critMult?' 倍率'+skill.critMult+'倍':'');
    if(skill.lifesteal) effect+=(effect?' | ':'')+'吸血'+(skill.lifesteal*100).toFixed(0)+'%';
    if(skill.poisonDmg) effect+=(effect?' | ':'')+'每回合中毒'+(skill.poisonDmg*100).toFixed(0)+'%';
    if(skill.stunRate) effect+=(effect?' | ':'')+'眩晕率'+(skill.stunRate*100).toFixed(0)+'%';
    if(skill.sealRate) effect+=(effect?' | ':'')+'封印率'+(skill.sealRate*100).toFixed(0)+'%';
    if(skill.shield) effect+=(effect?' | ':'')+'护盾'+skill.shield+'层';
    if(skill.reduceDmg) effect+=(effect?' | ':'')+'减伤'+(skill.reduceDmg*100).toFixed(0)+'%';
    if(skill.counterRate) effect+=(effect?' | ':'')+'反击率'+(skill.counterRate*100).toFixed(0)+'%';
    if(skill.resurrectRate) effect+=(effect?' | ':'')+'复活率'+(skill.resurrectRate*100).toFixed(0)+'%';
    if(skill.speedBoost) effect+=(effect?' | ':'')+'速度翻倍';
    if(skill.drain) effect+=(effect?' | ':'')+'吸取'+(skill.drain*100).toFixed(0)+'%HP';
    if(skill.ignoreDef) effect+=(effect?' | ':'')+'无视防御';
    if(skill.reduceStat) effect+=(effect?' | ':'')+'属性降低';
    document.getElementById('skill-popup-effect').textContent=effect||'无特殊效果';
    document.getElementById('skill-popup').classList.add('show');
    document.getElementById('skill-backdrop').classList.add('show');
}

function hideSkillPopup() {
    document.getElementById('skill-popup').classList.remove('show');
    document.getElementById('skill-backdrop').classList.remove('show');
    document.getElementById('skill-tooltip').classList.remove('show');
}

function showSkillTooltip(skillId) {
    const skill=ALL_SKILLS.find(s=>s.id===skillId);
    if(!skill) return;
    document.getElementById('skill-tooltip-name').textContent=skill.icon+' '+skill.name;
    document.getElementById('skill-tooltip-desc').textContent=skill.desc;
    const tooltip=document.getElementById('skill-tooltip');
    tooltip.classList.add('show');
    const event=window.event;
    if(event && event.target) {
        const rect=event.target.getBoundingClientRect();
        tooltip.style.left=(rect.left+rect.width/2-100)+'px';
        tooltip.style.top=(rect.bottom+5)+'px';
    }
}

function hideSkillTooltip() {
    document.getElementById('skill-tooltip').classList.remove('show');
}

function updateAutoIndicator() {
    const indicator=document.getElementById('auto-indicator');
    indicator.classList.add('active');
}

function toggleSpeed() {
    S.battleSpeed = S.battleSpeed === 1 ? 2 : 1;
    updateSpeedButton();
}

function updateSpeedButton() {
    const btn = document.getElementById('btn-speed');
    if(S.battleSpeed === 2) {
        btn.textContent = '⏩ 2倍速';
        btn.classList.add('btn-warning');
    } else {
        btn.textContent = '⏩ 1倍速';
        btn.classList.remove('btn-warning');
    }
}

function getBattleDelay() {
    return AUTO_BATTLE_DELAY / S.battleSpeed;
}

function addLog(msg) {
    const log=document.getElementById('battle-log');
    const e=document.createElement('div');
    e.className='log-entry';
    e.innerHTML=msg;
    log.insertBefore(e, log.firstChild);
    while(log.children.length>50) log.removeChild(log.lastChild);
}

function updateUI() {
    document.getElementById('round-num').textContent=S.round;
    document.getElementById('gold').textContent=S.gold;
    document.getElementById('exp').textContent=S.player.exp+'/'+S.player.expToLevel;
    document.getElementById('phase').textContent=PHASES[S.phase];
    document.getElementById('level').textContent=S.player.level;
    document.getElementById('stamina-bar').style.width=(S.player.stamina/S.player.maxStamina*100)+'%';
    document.getElementById('stamina-text').textContent=Math.floor(S.player.stamina)+'/'+S.player.maxStamina;
    updatePlayerUI();
    updateEnemyUI();
    updateEvolveButton();
    updateAutoIndicator();
}

function updatePlayerUI() {
    document.getElementById('player-sprite').textContent=PHASE_SPRITES[S.phase];
    document.getElementById('player-name').textContent=S.player.name;
    document.getElementById('player-level').textContent='Lv.'+S.player.level;
    const hpPct=S.player.hp/S.player.maxHp*100;
    const hpBar=document.getElementById('player-hp-bar');
    hpBar.style.width=hpPct+'%';
    hpBar.className='hp-fill'+(hpPct>50?' green':'');
    document.getElementById('player-hp').textContent=Math.max(0,Math.floor(S.player.hp));
    document.getElementById('player-max-hp').textContent=S.player.maxHp;
    document.getElementById('player-stats').textContent='攻:'+S.player.atk+' 防:'+S.player.def+' 速:'+S.player.spd;
    const speedPct=Math.min(100,S.player.spd/20*100);
    document.getElementById('player-speed-bar').style.width=speedPct+'%';
    document.getElementById('player-skills').innerHTML='技能: '+S.player.skills.map(s=>'<span class="skill-item" onmouseenter="showSkillTooltip(\''+s.id+'\')" onmouseleave="hideSkillTooltip()" onclick="showSkillPopup(\''+s.id+'\')">'+s.icon+'</span>').join(' ');
    updateBuffsDisplay('player-buffs', S.player);
}

function updateEnemyUI() {
    if(!S.enemy) return;
    document.getElementById('enemy-sprite').textContent='🤖';
    document.getElementById('enemy-name').textContent=S.enemy.name;
    document.getElementById('enemy-level').textContent='Lv.'+S.enemy.level;
    const hpPct=S.enemy.hp/S.enemy.maxHp*100;
    const hpBar=document.getElementById('enemy-hp-bar');
    hpBar.style.width=hpPct+'%';
    hpBar.className='hp-fill'+(hpPct>50?' green':'');
    document.getElementById('enemy-hp').textContent=Math.max(0,Math.floor(S.enemy.hp));
    document.getElementById('enemy-max-hp').textContent=S.enemy.maxHp;
    document.getElementById('enemy-stats').textContent='攻:'+S.enemy.atk+' 防:'+S.enemy.def+' 速:'+S.enemy.spd;
    const speedPct=Math.min(100,S.enemy.spd/20*100);
    document.getElementById('enemy-speed-bar').style.width=speedPct+'%';
    updateBuffsDisplay('enemy-buffs', S.enemy);
    document.getElementById('enemy-skills').innerHTML='技能: '+S.enemy.skills.map(s=>'<span class="skill-item" onmouseenter="showSkillTooltip(\''+s.id+'\')" onmouseleave="hideSkillTooltip()" onclick="showSkillPopup(\''+s.id+'\')">'+s.icon+'</span>').join(' ');
}

function updateBuffsDisplay(id, entity) {
    const container=document.getElementById(id);
    container.innerHTML='';
    entity.buffs.forEach(b=>{
        const tag=document.createElement('span');
        tag.className='buff-tag buff-'+b.type;
        tag.textContent=b.icon+' '+b.name;
        container.appendChild(tag);
    });
    if(entity.shields>0) {
        const tag=document.createElement('span');
        tag.className='buff-tag buff-shield';
        tag.textContent='🔰 '+entity.shields;
        container.appendChild(tag);
    }
}

function updateEvolveButton() {
    const btn=document.getElementById('btn-evolve');
    if(S.phase>=PHASES.length-1) { btn.disabled=true; btn.textContent='已满级'; return; }
    const cost=100;
    btn.disabled=S.gold<cost;
    btn.textContent='🌀 进化 ('+cost+'金)';
}

function startBattle() {
    if(S.inBattle) return;
    showEnemySelect();
}

function showEnemySelect() {
    const list=document.getElementById('enemy-select-list');
    list.innerHTML='';
    for(let i=0;i<3;i++) {
        const r=S.round+(i*0.5),m=1+(r-1)*0.15;
        const nameOpt=ENEMY_NAMES[Math.min(Math.floor(r)-1,ENEMY_NAMES.length-1)]||'强化龙虾#'+Math.floor(r);
        const hp=Math.floor((100+r*15)*m);
        const atk=Math.floor((6+r*1.2)*m);
        const def=Math.floor((3+r*0.8)*m);
        const spd=Math.floor((5+r*0.6)*m);
        const cnt=3+Math.min(Math.floor(r/3),4);
        const avail=ALL_SKILLS.filter(x=>x.id!=='resurrect'||Math.random()<0.2);
        const skills=[...avail].sort(()=>Math.random()-0.5).slice(0,Math.min(cnt,avail.length,6));
        const div=document.createElement('div');
        div.className='enemy-option';
        div.innerHTML='<div class="enemy-option-name">🤖 '+nameOpt+' (Lv.'+Math.floor(r)+')</div>'+
            '<div class="enemy-option-stats">生命:'+hp+' 攻:'+atk+' 防:'+def+' 速:'+spd+'</div>'+
            '<div class="enemy-option-skills">技能: '+skills.map(s=>s.icon+s.name).join(' ')+'</div>';
        div.onclick=()=>selectEnemy(nameOpt,Math.floor(r),hp,atk,def,spd,skills);
        list.appendChild(div);
    }
    document.getElementById('enemy-select-panel').classList.add('show');
}

function closeEnemySelect() {
    document.getElementById('enemy-select-panel').classList.remove('show');
}

function selectEnemy(name,level,hp,atk,def,spd,skills) {
    closeEnemySelect();
    S.enemy={
        name:name,level:level,hp:hp,maxHp:hp,
        atk:atk,def:def,spd:spd,
        stamina:MAX_STAMINA,maxStamina:MAX_STAMINA,
        skills:skills.map(s=>cloneSkill(s)),
        buffs:[],shields:0,poisonDmg:0,alive:true,resurrected:false,
        stunned:false,sealed:false,resurrectRate:0,counterRate:0,reduceDmgRate:0,
        speedBoosted:false,defReduced:false,lifesteal:0
    };
    // 刷新敌人被动
    S.enemy.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.enemy.lifesteal=s.lifesteal;
            if(s.id==='counter') S.enemy.counterRate=s.counterRate;
            if(s.id==='resurrect') S.enemy.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.enemy.speedBoosted=true;
        }
    });
    // 重置玩家CD
    S.playerCooldowns={};
    S.enemyCooldowns={};
    // 刷新玩家被动
    S.player.lifesteal=0;S.player.counterRate=0;S.player.resurrectRate=0;
    S.player.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.player.lifesteal=s.lifesteal;
            if(s.id==='counter') S.player.counterRate=s.counterRate;
            if(s.id==='resurrect') S.player.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.player.speedBoosted=true;
        }
    });
    S.inBattle=true;
    S.phase=1;
    S.turn=0;
    S.player.stamina=Math.min(S.player.maxStamina,S.player.stamina+STAMINA_REGEN_BATTLE);
    S.enemy.stamina=Math.min(S.enemy.maxStamina,S.enemy.stamina+STAMINA_REGEN_BATTLE);
    document.getElementById('btn-start').disabled=true;
    updateUI();
    addLog('<span class="log-system">⚔️ 第 '+S.round+' 轮战斗开始!</span>');
    addLog('<span class="log-enemy">⚔️ 遇到野生 '+S.enemy.name+' (Lv.'+S.enemy.level+')</span>');
    addLog('<span class="log-system">📋 敌人技能: '+S.enemy.skills.map(s=>s.icon+s.name).join(' ')+'</span>');
    S.turn=1;
    addLog('<span class="log-turn">━━━ 第 1 回合 ━━━</span>');
    setTimeout(executeAutoTurn, getBattleDelay());
}

function executeAutoTurn() {
    if(!S.inBattle || S.phase!==1) return;
    if(S.player.stunned) {
        addLog('<span class="log-player">😵 被晕了，无法行动!</span>');
        updateUI();
        setTimeout(()=>enemyTurn(),getBattleDelay());
        return;
    }
    if(S.player.sealed) {
        addLog('<span class="log-player">🔒 被封印了，无法行动!</span>');
        S.player.sealed=false;
        updateUI();
        setTimeout(()=>enemyTurn(),getBattleDelay());
        return;
    }
    // 收集可用技能（排除被动、排除CD中的）
    const availSkills=S.player.skills.filter(s=>{
        if(s.passive) return false;
        const cd=S.playerCooldowns[s.id]||0;
        if(cd>0) return false;
        return S.player.stamina>=s.staminaCost;
    });
    
    if(availSkills.length===0 && S.player.stamina<5) {
        addLog('<span class="log-player">⚡ 体力不足，跳过回合</span>');
        updateUI();
        setTimeout(()=>enemyTurn(),getBattleDelay());
        return;
    }
    
    // 构建行动队列
    S.battleQueue=[];
    
    // 添加技能到队列
    availSkills.forEach(skill=>{
        S.battleQueue.push({type:'skill',skill:skill,isPlayer:true});
    });
    
    // 添加平A到队列
    if(S.player.stamina>=5) {
        S.battleQueue.push({type:'attack',isPlayer:true});
    }
    
    S.isProcessing=true;
    processBattleQueue();
}

function processBattleQueue() {
    if(!S.inBattle || S.battleQueue.length===0) {
        S.isProcessing=false;
        S.player.hp=Math.min(S.player.maxHp,S.player.hp);
        S.enemy.hp=Math.max(0,S.enemy.hp);
        updateUI();
        if(S.enemy.hp<=0) {
            enemyDefeated();
        } else {
            setTimeout(()=>enemyTurn(),getBattleDelay());
        }
        return;
    }
    
    const action=S.battleQueue.shift();
    const delay=getBattleDelay();
    
    if(action.type==='skill') {
        const skill=action.skill;
        if(skill.cd>0) S.playerCooldowns[skill.id]=skill.cd;
        S.player.stamina-=skill.staminaCost;
        addLog('<span class="log-player">🎯 '+S.player.name+' 使用 【'+skill.icon+skill.name+'】</span>');
        processSkillEffect(skill,S.player,S.enemy,true);
        updateUI();
        setTimeout(processBattleQueue,delay);
    } else if(action.type==='attack') {
        S.player.stamina-=5;
        const atkDmg=Math.max(1,Math.floor(S.player.atk*0.8));
        let finalDmg=atkDmg;
        const isCrit=Math.random()<0.2;
        if(isCrit) finalDmg*=2;
        // 检查连击
        const hasCombo=S.player.skills.find(s=>s.id==='combo');
        if(hasCombo) {
            finalDmg*=2;
            addLog('<span class="log-player">💥 【连击】触发! 伤害翻倍!</span>');
        }
        // 护盾吸收
        if(S.enemy.shields>0) {
            const absorb=Math.min(S.enemy.shields,finalDmg);
            S.enemy.shields-=absorb;
            finalDmg-=absorb;
            addLog('<span class="log-system">🛡️ 护盾吸收了 '+absorb+' 伤害</span>');
        }
        S.enemy.hp-=finalDmg;
        addLog('<span class="log-player">👊 '+S.player.name+' 普通攻击 '+(isCrit?'💥暴击! ':'')+'造成 '+finalDmg+' 伤害</span>');
        showDamageNumber(document.getElementById('enemy-fighter'),finalDmg+(isCrit?' 💥':''),isCrit?'crit':'damage');
        playAttackAnimation('player-fighter','enemy-fighter',isCrit);
        // 吸血被动
        if(S.player.lifesteal>0) {
            const heal=Math.floor(finalDmg*S.player.lifesteal);
            S.player.hp=Math.min(S.player.maxHp,S.player.hp+heal);
            addLog('<span class="log-heal">💉 【吸血】 回复 '+heal+' HP</span>');
        }
        updateUI();
        setTimeout(processBattleQueue,delay);
    }
}

function processSkillEffect(skill, attacker, defender, isPlayer) {
    let totalDmg=0;
    const times=skill.times||1;
    const isCrit=Math.random()<(skill.critRate||0);
    const critMult=isCrit?(skill.critMult||2):1;
    for(let t=0;t<times;t++) {
        let dmg=0;
        if(skill.type==='attack'&&(skill.minDmg||skill.minDmg===0)) {
            dmg=Math.max(1,Math.floor(attacker.atk*skill.minDmg*critMult));
        }
        if(skill.drain) {
            const drainAmt=Math.floor(defender.hp*skill.drain);
            defender.hp-=drainAmt;
            attacker.hp=Math.min(attacker.maxHp,attacker.hp+drainAmt);
            addLog('<span class="log-heal">'+(isPlayer?'我':'敌')+' 吸取 '+drainAmt+' HP</span>');
        }
        if(skill.lifesteal) {
            const healAmt=Math.floor(dmg*skill.lifesteal);
            attacker.hp=Math.min(attacker.maxHp,attacker.hp+healAmt);
            addLog('<span class="log-heal">'+(isPlayer?'我':'敌')+' 吸血 '+healAmt+' HP</span>');
        }
        if(skill.ignoreDef) {
            defender.hp-=dmg;
            totalDmg+=dmg;
        } else {
            const def=defender.def||0;
            const finalDmg=Math.max(1,Math.floor(dmg*(1-def/(dmg+100))));
            defender.hp-=finalDmg;
            totalDmg+=finalDmg;
        }
        if(isPlayer&&dmg>0) showDamageNumber(document.getElementById('enemy-fighter'), dmg+(isCrit?' 💥':''), isCrit?'crit':'damage');
        if(!isPlayer&&dmg>0) showDamageNumber(document.getElementById('player-fighter'), dmg+(isCrit?' 💥':''), isCrit?'crit':'damage');
    }
    if(isCrit&&totalDmg>0) addLog('<span class="log-crit">💥 暴击! 造成 '+totalDmg+' 伤害</span>');
    else if(totalDmg>0) addLog('<span class="log-damage">'+(isPlayer?'对敌':'对你')+'造成 '+totalDmg+' 伤害</span>');
    if(skill.poisonDmg) {
        defender.poisonDmg=(defender.poisonDmg||0)+skill.poisonDmg;
        addLog('<span class="log-damage">'+(isPlayer?'敌':'我')+' 中了剧毒!</span>');
    }
    if(skill.stunRate&&Math.random()<skill.stunRate) {
        defender.stunned=true;
        addLog('<span class="log-system">'+(isPlayer?'敌':'我')+' 被晕了!</span>');
    }
    if(skill.sealRate&&Math.random()<skill.sealRate) {
        defender.sealed=true;
        addLog('<span class="log-system">'+(isPlayer?'敌':'我')+' 被封印了!</span>');
    }
    if(skill.reduceDmg) {
        defender.reduceDmgRate=(defender.reduceDmgRate||0)+skill.reduceDmg;
    }
    if(skill.speedBoost) {
        attacker.speedBoosted=true;
        addLog('<span class="log-system">'+(isPlayer?'我':'敌')+' 速度翻倍!</span>');
    }
    if(skill.shield) {
        attacker.shields=(attacker.shields||0)+skill.shield;
        addLog('<span class="log-system">'+(isPlayer?'我':'敌')+' 获得 '+skill.shield+' 层护盾!</span>');
    }
    if(skill.counterRate) {
        attacker.counterRate=skill.counterRate;
    }
    if(skill.resurrectRate) {
        attacker.resurrectRate=skill.resurrectRate;
    }
    if(skill.reduceStat) {
        defender.defReduced=true;
    }
    if(isPlayer) playAttackAnimation('player-fighter','enemy-fighter',isCrit);
    else playAttackAnimation('enemy-fighter','player-fighter',isCrit);
    attacker.hp=Math.min(attacker.maxHp,attacker.hp);
    defender.hp=Math.max(0,defender.hp);
    return totalDmg;
}

function enemyTurn() {
    if(!S.inBattle) return;
    if(S.enemy.hp<=0) {
        enemyDefeated();
        return;
    }
    if(S.enemy.stunned) {
        addLog('<span class="log-enemy">😵 敌人被晕了，无法行动!</span>');
        S.enemy.stunned=false;
        updateUI();
        setTimeout(()=>endTurn(),getBattleDelay());
        return;
    }
    if(S.enemy.sealed) {
        addLog('<span class="log-enemy">🔒 敌人被封印了，无法行动!</span>');
        S.enemy.sealed=false;
        updateUI();
        setTimeout(()=>endTurn(),getBattleDelay());
        return;
    }
    // 收集可用技能
    const availSkills=S.enemy.skills.filter(s=>{
        if(s.passive) return false;
        const cd=S.enemyCooldowns[s.id]||0;
        if(cd>0) return false;
        return S.enemy.stamina>=s.staminaCost;
    });
    
    if(availSkills.length===0 && S.enemy.stamina<5) {
        addLog('<span class="log-enemy">⚡ 敌人体力不足，跳过回合</span>');
        updateUI();
        setTimeout(()=>endTurn(),getBattleDelay());
        return;
    }
    
    // 构建敌人行动队列
    S.battleQueue=[];
    
    // 添加技能到队列
    availSkills.forEach(skill=>{
        S.battleQueue.push({type:'skill',skill:skill,isPlayer:false});
    });
    
    // 添加平A到队列
    if(S.enemy.stamina>=5) {
        S.battleQueue.push({type:'attack',isPlayer:false});
    }
    
    processEnemyQueue();
}

function processEnemyQueue() {
    if(!S.inBattle || S.battleQueue.length===0) {
        S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp);
        S.player.hp=Math.max(0,S.player.hp);
        updateUI();
        if(S.player.hp<=0) {
            playerDefeated();
        } else {
            setTimeout(()=>endTurn(),getBattleDelay());
        }
        return;
    }
    
    const action=S.battleQueue.shift();
    const delay=getBattleDelay();
    
    if(action.type==='skill') {
        const skill=action.skill;
        if(skill.cd>0) S.enemyCooldowns[skill.id]=skill.cd;
        S.enemy.stamina-=skill.staminaCost;
        addLog('<span class="log-enemy">🎯 '+S.enemy.name+' 使用 【'+skill.icon+skill.name+'】</span>');
        processSkillEffect(skill,S.enemy,S.player,false);
        updateUI();
        setTimeout(processEnemyQueue,delay);
    } else if(action.type==='attack') {
        S.enemy.stamina-=5;
        const atkDmg=Math.max(1,Math.floor(S.enemy.atk*0.8));
        let finalDmg=atkDmg;
        const isCrit=Math.random()<0.2;
        if(isCrit) finalDmg*=2;
        // 检查连击
        const hasCombo=S.enemy.skills.find(s=>s.id==='combo');
        if(hasCombo) {
            finalDmg*=2;
            addLog('<span class="log-enemy">💥 【连击】触发! 伤害翻倍!</span>');
        }
        // 护盾吸收
        if(S.player.shields>0) {
            const absorb=Math.min(S.player.shields,finalDmg);
            S.player.shields-=absorb;
            finalDmg-=absorb;
            addLog('<span class="log-system">🛡️ 护盾吸收了 '+absorb+' 伤害</span>');
        }
        S.player.hp-=finalDmg;
        addLog('<span class="log-enemy">👊 '+S.enemy.name+' 普通攻击 '+(isCrit?'💥暴击! ':'')+'造成 '+finalDmg+' 伤害</span>');
        showDamageNumber(document.getElementById('player-fighter'),finalDmg+(isCrit?' 💥':''),isCrit?'crit':'damage');
        playAttackAnimation('enemy-fighter','player-fighter',isCrit);
        // 敌方吸血被动
        if(S.enemy.lifesteal>0) {
            const heal=Math.floor(finalDmg*S.enemy.lifesteal);
            S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp+heal);
            addLog('<span class="log-heal">💉 【吸血】 敌人回复 '+heal+' HP</span>');
        }
        updateUI();
        setTimeout(processEnemyQueue,delay);
    }
}

function endTurn() {
    if(!S.inBattle) return;
    // 减少CD
    for(let id in S.playerCooldowns) {
        if(S.playerCooldowns[id]>0) S.playerCooldowns[id]--;
    }
    for(let id in S.enemyCooldowns) {
        if(S.enemyCooldowns[id]>0) S.enemyCooldowns[id]--;
    }
    // 刷新被动状态
    S.player.lifesteal=0;S.player.counterRate=0;S.player.resurrectRate=0;S.player.speedBoosted=false;
    S.player.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.player.lifesteal=s.lifesteal;
            if(s.id==='counter') S.player.counterRate=s.counterRate;
            if(s.id==='resurrect') S.player.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.player.speedBoosted=true;
        }
    });
    S.enemy.lifesteal=0;S.enemy.counterRate=0;S.enemy.resurrectRate=0;S.enemy.speedBoosted=false;
    S.enemy.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.enemy.lifesteal=s.lifesteal;
            if(s.id==='counter') S.enemy.counterRate=s.counterRate;
            if(s.id==='resurrect') S.enemy.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.enemy.speedBoosted=true;
        }
    });
    // 毒伤
    if(S.player.poisonDmg>0) {
        const pDmg=Math.floor(S.player.maxHp*S.player.poisonDmg);
        S.player.hp-=pDmg;
        addLog('<span class="log-damage">🔥 【中毒】你的龙虾受到 '+pDmg+' 伤害</span>');
        showDamageNumber(document.getElementById('player-fighter'), pDmg, 'poison');
    }
    if(S.enemy.poisonDmg>0) {
        const eDmg=Math.floor(S.enemy.maxHp*S.enemy.poisonDmg);
        S.enemy.hp-=eDmg;
        addLog('<span class="log-damage">🔥 【中毒】敌人受到 '+eDmg+' 伤害</span>');
    }
    if(S.player.defReduced&&Math.random()<0.3) S.player.defReduced=false;
    if(S.enemy.defReduced&&Math.random()<0.3) S.enemy.defReduced=false;
    S.player.stamina=Math.min(S.player.maxStamina,S.player.stamina+STAMINA_REGEN_BATTLE);
    S.enemy.stamina=Math.min(S.enemy.maxStamina,S.enemy.stamina+STAMINA_REGEN_BATTLE);
    addLog('<span class="log-system">💚 回合结束，双方恢复 '+STAMINA_REGEN_BATTLE+' 体力</span>');
    S.player.buffs=[];
    S.enemy.buffs=[];
    updateUI();
    if(S.player.hp<=0) {
        playerDefeated();
        return;
    }
    if(S.enemy.hp<=0) {
        enemyDefeated();
        return;
    }
    addLog('<span class="log-turn">━━━ 第 '+(S.turn+1)+' 回合 ━━━</span>');
    S.turn++;
    setTimeout(executeAutoTurn, getBattleDelay());
}

function enemyDefeated() {
    S.inBattle=false;
    S.battleResult='win';
    const expGain=10+S.round*3;
    const goldGain=5+S.round*2;
    S.player.exp+=expGain;
    S.gold+=goldGain;
    levelUp();
    addLog('<span class="log-system">🎉 胜利! 获得 '+expGain+' 经验, '+goldGain+' 金币</span>');
    if(S.enemy && S.enemy.skills.length>0) {
        const enemySkillIdx=Math.floor(Math.random()*S.enemy.skills.length);
        const newSkill=cloneSkill(S.enemy.skills[enemySkillIdx]);
        if(!S.player.skills.find(s=>s.id===newSkill.id)) {
            S.player.skills.push(newSkill);
            addLog('<span class="log-player">🌟 偷学到新技能: '+newSkill.icon+newSkill.name+'</span>');
            document.getElementById('reward-skill-name').textContent=newSkill.icon+newSkill.name;
            document.getElementById('reward-skill-container').style.display='block';
        } else {
            document.getElementById('reward-skill-container').style.display='none';
        }
    } else {
        document.getElementById('reward-skill-container').style.display='none';
    }
    document.getElementById('reward-exp').textContent=expGain;
    document.getElementById('reward-gold').textContent=goldGain;
    document.getElementById('reward-panel').classList.add('show');
    document.getElementById('btn-start').disabled=false;
    S.round++;
    updateUI();
}

function playerDefeated() {
    if(S.player.resurrectRate>0&&!S.player.resurrectUsed&&Math.random()<S.player.resurrectRate) {
        S.player.hp=Math.floor(S.player.maxHp*0.5);
        S.player.resurrectUsed=true;
        playResurrectAnimation(document.getElementById('player-fighter'));
        addLog('<span class="log-player">✨ 神佑发动! 复活并恢复 50% HP!</span>');
        updateUI();
        return;
    }
    S.inBattle=false;
    S.battleResult='lose';
    addLog('<span class="log-system">💀 败北...</span>');
    document.getElementById('game-over-title').textContent='游戏结束';
    document.getElementById('game-over-msg').textContent='你的龙虾在第 '+S.round+' 轮倒下了...';
    document.getElementById('final-round').textContent=S.round;
    // 延迟显示结算，让玩家先看战报
    document.getElementById('btn-start').disabled=true;
    setTimeout(()=>{
        document.getElementById('game-over').classList.add('show','lose');
    }, 2000);
}

function closeReward() {
    document.getElementById('reward-panel').classList.remove('show');
}

function evolve() {
    if(S.gold<100||S.phase>=PHASES.length-1) return;
    S.gold-=100;
    S.phase++;
    calcPlayerStats();
    S.player.hp=S.player.maxHp;
    document.getElementById('evolution-text').textContent='🌀 '+PHASES[S.phase]+'!';
    document.getElementById('evolution-overlay').classList.add('show');
    setTimeout(()=>{
        document.getElementById('evolution-overlay').classList.remove('show');
    }, 2000);
    addLog('<span class="log-player">🌀 进化为 '+PHASES[S.phase]+'!'+'</span>');
    updateUI();
}

function restartGame() {
    document.getElementById('game-over').classList.remove('show','lose','win');
    document.getElementById('battle-log').innerHTML='';
    initState();
    showWelcomeLobster();
    document.getElementById('welcome-panel').classList.add('show');
    updateUI();
}

function closeWelcome() {
    document.getElementById('welcome-panel').classList.remove('show');
}

function showWelcomeLobster() {
    if(S.player && S.player.skills) {
        document.getElementById('welcome-sprite').textContent=PHASE_SPRITES[0];
        document.getElementById('welcome-skills').textContent='技能: '+S.player.skills.map(s=>s.icon+s.name).join(' ');
    }
}

// 初始化
initState();
showWelcomeLobster();
updateSpeedButton();
document.getElementById('welcome-panel').classList.add('show');
updateUI();
addLog('<span class="log-system">⚡ 赛博斗龙虾 v1.19 准备就绪!</span>');
addLog('<span class="log-system">💡 点击"开始战斗"进入战斗!</span>');
</script>
