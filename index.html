<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博斗龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            min-height: 100vh;
            color: #00ff88;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .title {
            text-align: center;
            font-size: 2.5em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            margin: 20px 0;
            animation: glitch 3s infinite;
        }
        .version { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat { text-align: center; min-width: 80px; }
        .stat-label { font-size: 0.8em; color: #888; }
        .stat-value { font-size: 1.4em; color: #00ff88; }

        .arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }
        .arena::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.03) 2px, rgba(0,255,136,0.03) 4px);
            pointer-events: none;
        }
        .fighter { text-align: center; width: 45%; position: relative; z-index: 1; transition: transform 0.2s; }
        .fighter-sprite { font-size: 80px; margin-bottom: 10px; transition: all 0.3s; position: relative; animation: lobsterFloat 3s ease-in-out infinite; transform-origin: center bottom; }
        @keyframes lobsterFloat { 0%,100%{transform:translateY(0) rotate(0deg)} 25%{transform:translateY(-8px) rotate(2deg)} 75%{transform:translateY(-4px) rotate(-2deg)} }
        @keyframes lobsterAttack { 0%{transform:translateX(0)} 30%{transform:translateX(30px) scale(1.1)} 60%{transform:translateX(15px)} 100%{transform:translateX(0)} }
        @keyframes lobsterHit { 0%{transform:translateX(0);filter:brightness(1)} 20%{transform:translateX(-10px);filter:brightness(2)} 40%{transform:translateX(5px)} 60%{transform:translateX(-5px);filter:brightness(1.5)} 100%{transform:translateX(0);filter:brightness(1)} }
        @keyframes lobsterVictory { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-15px) scale(1.1)} }
        @keyframes lobsterDeath { 0%{transform:rotate(0) scale(1);opacity:1} 50%{transform:rotate(180deg) scale(0.5);opacity:0.5} 100%{transform:rotate(360deg) scale(0);opacity:0} }
        @keyframes lobsterGlow { 0%,100%{filter:drop-shadow(0 0 10px currentColor)} 50%{filter:drop-shadow(0 0 25px currentColor)} }
        @keyframes lobsterCritical { 0%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.3);filter:brightness(1.5) hue-rotate(20deg)} 100%{transform:scale(1);filter:brightness(1)} }
        .lobster-phase-0 { color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
        .lobster-phase-1 { color: #ffa500; text-shadow: 0 0 20px #ffa500; animation: lobsterFloat 2.5s ease-in-out infinite, lobsterGlow 2s ease-in-out infinite; }
        .lobster-phase-2 { color: #00ff88; text-shadow: 0 0 25px #00ff88; animation: lobsterFloat 2s ease-in-out infinite, lobsterGlow 1.5s ease-in-out infinite; }
        .lobster-phase-3 { color: #00ffff; text-shadow: 0 0 30px #00ffff, 0 0 60px #0088ff; animation: lobsterFloat 1.5s ease-in-out infinite, lobsterGlow 1s ease-in-out infinite; }
        @keyframes lowHpWarning {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 10px currentColor); }
            50% { filter: brightness(1.5) drop-shadow(0 0 25px #ff0000); }
        }
        .low-hp-warning { animation: lowHpWarning 0.8s ease-in-out infinite !important; }
        .enemy-sprite { font-size: 80px; margin-bottom: 10px; transition: all 0.3s; position: relative; animation: enemyIdle 2s ease-in-out infinite, enemyGlow 1.5s ease-in-out infinite; color: #ff4444; text-shadow: 0 0 20px #ff4444; }
        @keyframes enemyIdle { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-5px) scale(1.02)} }
        @keyframes enemyGlow { 0%,100%{filter:drop-shadow(0 0 15px #ff4444)} 50%{filter:drop-shadow(0 0 30px #ff4444)} }
        @keyframes enemyAttack { 0%{transform:translateX(0)} 30%{transform:translateX(-30px) scale(1.1)} 60%{transform:translateX(-15px)} 100%{transform:translateX(0)} }
        .enemy-attacking-left { animation: enemyAttack 0.4s ease-out !important; }
        .attacking-right { animation: lobsterAttack 0.4s ease-out !important; }
        .attacking-left { animation: lobsterAttack 0.4s ease-out !important; transform: scaleX(-1); }
        .hit-flash { animation: lobsterHit 0.4s ease-out !important; }
        .crit-effect { animation: lobsterCritical 0.6s ease-out !important; }
        .victory-effect { animation: lobsterVictory 0.8s ease-in-out infinite !important; }
        .death-effect { animation: lobsterDeath 1s ease-out forwards !important; }
        .fighter-name { font-size: 1.2em; color: #fff; margin-bottom: 5px; }
        .fighter-level { font-size: 0.9em; color: #aaa; margin-bottom: 10px; }
        .hp-bar { background: #333; border-radius: 10px; height: 20px; overflow: hidden; margin-bottom: 5px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); transition: width 0.3s; }
        .hp-fill.green { background: linear-gradient(90deg, #00ff88, #00cc66); }
        .hp-text { font-size: 0.85em; color: #888; }
        .fighter-stats { font-size: 0.8em; color: #00ff88; margin-top: 5px; }
        .buffs-display { min-height: 24px; margin-top: 6px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
        .buff-tag { display: inline-block; font-size: 0.7em; padding: 2px 6px; border-radius: 6px; margin: 2px; }
        .buff-poison { background: rgba(128,255,0,0.15); border: 1px solid #80ff00; color: #80ff00; }
        .buff-shield { background: rgba(68,136,255,0.15); border: 1px solid #4488ff; color: #4488ff; }
        .buff-stun { background: rgba(255,200,0,0.15); border: 1px solid #ffc800; color: #ffc800; }
        .buff-seal { background: rgba(180,80,255,0.15); border: 1px solid #b450ff; color: #b450ff; }
        .buff-speed { background: rgba(255,100,50,0.15); border: 1px solid #ff6432; color: #ff6432; }
        .buff-defend { background: rgba(100,180,255,0.15); border: 1px solid #64b4ff; color: #64b4ff; }
        .buff-counter { background: rgba(255,150,50,0.15); border: 1px solid #ff9632; color: #ff9632; }
        .vs { font-size: 2em; color: #ff4444; text-shadow: 0 0 10px #ff4444; animation: pulse 1s infinite; position: relative; z-index: 1; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, 4px); }
            80% { transform: translate(3px, -2px); }
        }
        .screen-shake { animation: screenShake 0.2s ease-out; }
        
        /* 战斗特效 */
        .damage-number {
            position: fixed;
            font-size: 2.5em;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 20px #ff0000, 4px 4px 0 #000;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            z-index: 1000;
        }
        .damage-number.crit {
            color: #ffff00;
            font-size: 3.5em;
            text-shadow: 0 0 40px #ffff00, 0 0 80px #ff4400, 5px 5px 0 #000;
            animation: critFloat 1.2s ease-out forwards;
        }
        @keyframes critFloat {
            0% { transform: translateY(0) scale(0.3) rotate(-10deg); opacity: 0; }
            15% { transform: translateY(-20px) scale(1.5) rotate(5deg); opacity: 1; }
            30% { transform: translateY(-40px) scale(1.8) rotate(-3deg); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .damage-number.heal {
            color: #00ff88;
            text-shadow: 0 0 15px #00ff00, 3px 3px 0 #000;
            font-size: 2.2em;
        }
        .damage-number.poison {
            color: #80ff00;
            text-shadow: 0 0 15px #80ff00, 3px 3px 0 #000;
        }
        .damage-number.stun {
            color: #ffc800;
            text-shadow: 0 0 15px #ffc800, 3px 3px 0 #000;
        }
        .crit-flash {
            animation: critScreenFlash 0.3s ease-out;
        }
        @keyframes critScreenFlash {
            0%{filter:brightness(1)}
            50%{filter:brightness(1.5) sepia(0.3)}
            100%{filter:brightness(1)}
        }
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-10px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        @keyframes attackRight {
            0% { transform: translateX(0); }
            30% { transform: translateX(50px) scale(1.1); }
            60% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }
        @keyframes attackLeft {
            0% { transform: translateX(0); }
            30% { transform: translateX(-50px) scale(1.1); }
            60% { transform: translateX(-20px); }
            100% { transform: translateX(0); }
        }
        @keyframes hitFlash {
            0%, 100% { filter: brightness(1); }
            25% { filter: brightness(2) hue-rotate(30deg); }
            50% { filter: brightness(0.5); }
            75% { filter: brightness(1.5); }
        }
        @keyframes critEffect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(2) hue-rotate(45deg); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes resurrection {
            0% { transform: scale(0.5); opacity: 0; filter: brightness(0); }
            50% { transform: scale(1.5); opacity: 1; filter: brightness(3) hue-rotate(120deg); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }
        .attacking-right { animation: attackRight 0.4s ease-out !important; }
        .attacking-left { animation: attackLeft 0.4s ease-out !important; }
        .hit-flash { animation: hitFlash 0.3s ease-out !important; }
        .crit-effect { animation: critEffect 0.5s ease-out !important; }
        .resurrect-effect { animation: resurrection 0.8s ease-out !important; }
        
        .skills-section {
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .skills-title { font-size: 1em; color: #00ff88; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .skill-btn {
            background: linear-gradient(135deg, #1a3a2a, #0a2a1a);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
            color: #00ff88;
            font-family: inherit;
            text-align: left;
            position: relative;
        }
        .skill-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #2a5a3a, #1a4a2a);
            box-shadow: 0 0 10px rgba(0,255,136,0.3);
            transform: translateY(-2px);
        }
        .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .skill-btn .skill-name { font-weight: bold; display: block; }
        .skill-btn .skill-cost { font-size: 0.75em; color: #888; }
        .skill-btn .skill-desc { font-size: 0.7em; color: #aaa; margin-top: 3px; }
        .skill-btn.attack { border-color: #ff6644; color: #ff6644; background: linear-gradient(135deg, #3a2a1a, #2a1a0a); }
        .skill-btn.defense { border-color: #4488ff; color: #4488ff; background: linear-gradient(135deg, #1a2a3a, #0a1a2a); }
        .skill-btn.special { border-color: #ff44ff; color: #ff44ff; background: linear-gradient(135deg, #2a1a2a, #1a0a1a); }
        .battle-log {
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry { font-size: 0.9em; padding: 6px 8px; border-bottom: 1px solid #222; animation: fadeIn 0.3s; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-player { color: #00ff88; }
        .log-enemy { color: #ff6644; }
        .log-damage { color: #ff4444; }
        .log-heal { color: #44ff44; }
        .log-crit { color: #ffff00; text-shadow: 0 0 5px #ffff00; }
        .log-system { color: #888; }
        .log-turn { color: #00ccff; font-weight: bold; }
        .btn {
            background: linear-gradient(135deg, #00aa55, #008844);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 1.1em;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #00cc66, #00aa55);
            box-shadow: 0 0 20px rgba(0,255,136,0.4);
            transform: translateY(-2px);
        }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-danger { background: linear-gradient(135deg, #aa0000, #880000); }
        .btn-warning { background: linear-gradient(135deg, #ff8800, #cc6600); }
        .btn-small { padding: 8px 15px; font-size: 0.9em; }
        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        
        .auto-battle-indicator {
            display: none;
            background: linear-gradient(135deg, #ff6600, #ff4400);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
            animation: autoPulse 1s infinite;
        }
        .auto-battle-indicator.active { display: block; }
        @keyframes autoPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,102,0,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,102,0,0.8); }
        }
        
        <div class="btn-row">
            <button class="btn" id="btn-start" onclick="startBattle()">🚀 开始战斗</button>
            <button class="btn" id="btn-speed" onclick="toggleSpeed()">⏩ 1倍速</button>
            <button class="btn btn-small btn-warning" id="btn-equip" onclick="openEquipPanel()">🎒 装备</button>
        </div>
    </div>
    </div>
    <div class="reward-panel" id="reward-panel">
        <div class="reward-title">🎉 战斗胜利!</div>
        <div class="reward-skill" id="reward-skill-container" style="display:none">
            <div>偷学到技能:</div>
            <div id="reward-skill-name"></div>
        </div>
        <div class="reward-equip" id="reward-equip-container" style="display:none">
            <div>📦 掉落装备:</div>
            <div id="reward-equip-name"></div>
        </div>
        <button class="btn" onclick="closeReward()">继续</button>
    </div>
    <div class="enemy-select-panel" id="enemy-select-panel">
        <div class="enemy-select-title">🎯 选择对手</div>
        <div class="enemy-select-list" id="enemy-select-list"></div>
        <button class="btn" onclick="closeEnemySelect()">返回</button>
    </div>
    <div class="skill-popup-backdrop" id="skill-backdrop" onclick="hideSkillPopup()"></div>
    <div class="equip-backdrop" id="equip-backdrop" onclick="closeEquipPanel()"></div>
    <div class="skill-popup" id="skill-popup">
        <div class="skill-popup-icon" id="skill-popup-icon"></div>
        <div class="skill-popup-name" id="skill-popup-name"></div>
        <div class="skill-popup-type" id="skill-popup-type"></div>
        <div class="skill-popup-cost" id="skill-popup-cost"></div>
        <div class="skill-popup-desc" id="skill-popup-desc"></div>
        <div class="skill-popup-effect" id="skill-popup-effect"></div>
    </div>
    <div class="equip-panel" id="equip-panel">
        <div class="equip-panel-title">🎒 装备管理</div>
        <div class="equip-current">
            <div class="equip-slot-title">当前穿戴</div>
            <div class="equip-slots">
                <div class="equip-slot" id="equip-slot-atk" onclick="unequipItem('atk')">
                    <div class="equip-slot-icon">⚔️</div>
                    <div class="equip-slot-label">攻击</div>
                    <div class="equip-slot-item" id="equip-slot-atk-item">空</div>
                </div>
                <div class="equip-slot" id="equip-slot-def" onclick="unequipItem('def')">
                    <div class="equip-slot-icon">🛡️</div>
                    <div class="equip-slot-label">防御</div>
                    <div class="equip-slot-item" id="equip-slot-def-item">空</div>
                </div>
                <div class="equip-slot" id="equip-slot-hp" onclick="unequipItem('hp')">
                    <div class="equip-slot-icon">❤️</div>
                    <div class="equip-slot-label">生命</div>
                    <div class="equip-slot-item" id="equip-slot-hp-item">空</div>
                </div>
            </div>
        </div>
        <div class="equip-inventory">
            <div class="equip-inv-title">背包 (<span id="inv-count">0</span>)</div>
            <div class="equip-inv-list" id="equip-inv-list"></div>
        </div>
        <button class="btn" onclick="closeEquipPanel()">关闭</button>
    </div>
    <div class="skill-tooltip" id="skill-tooltip">
        <div class="skill-tooltip-name" id="skill-tooltip-name"></div>
        <div class="skill-tooltip-desc" id="skill-tooltip-desc"></div>
    </div>
    <div class="mode-select-panel" id="mode-select-panel">
        <div class="mode-select-title">🎮 选择游戏模式</div>
        <div class="mode-options">
            <button class="btn btn-large" onclick="selectMode('raise')">🌱 养虾模式</button>
            <button class="btn btn-large" onclick="selectMode('import')">🦐 成虾导入</button>
        </div>
        <div class="mode-desc" id="mode-desc">🌱 养虾通关可获得成虾代码</div>
    </div>
    <div class="welcome-panel" id="welcome-panel">
        <div class="welcome-title">🎮 欢迎来到赛博斗龙虾!</div>
        <div class="welcome-content">
            <p>⏱️ 游戏共 <strong>5轮</strong> 战斗</p>
            <p>⚔️ 每次<strong>战胜</strong>可偷取对手<strong>1个技能</strong></p>
            <p>📦 战斗<strong>掉落装备</strong>，可穿戴提升战力</p>
            <p>⬆️ 每次升级有<strong>50%概率</strong>领悟新技能</p>

        </div>
        <div class="lobster-reveal">
            <div class="lobster-reveal-title">🎰 这是你的随机初始小龙虾!</div>
            <div class="lobster-reveal-sprite" id="welcome-sprite">🦐</div>
            <div class="lobster-reveal-name">你的龙虾</div>
            <div class="lobster-reveal-skills" id="welcome-skills">技能加载中...</div>
        </div>
        <button class="btn" onclick="closeWelcome()">开始游戏!</button>
    </div>
    <div class="import-panel" id="import-panel">
        <div class="import-title">🦐 导入成虾</div>
        <div class="import-desc">粘贴之前保存的龙虾序列化代码：</div>
        <textarea class="import-code" id="import-code" placeholder="在此粘贴龙虾代码..."></textarea>
        <div class="import-error" id="import-error" style="display:none;color:#ff4444;margin:10px 0;"></div>
        <button class="btn" onclick="confirmImport()">确认导入</button>
        <button class="btn btn-secondary" onclick="closeImportPanel()">返回</button>
    </div>
    <div class="export-panel" id="export-panel">
        <div class="export-title">🎉 养虾成功!</div>
        <div class="export-desc">你的龙虾已养成！保存以下代码以便下次导入：</div>
        <textarea class="export-code" id="export-code" readonly></textarea>
        <div class="export-hint">📋 请复制并保存此代码，下次可在"成虾导入"中使用</div>
        <button class="btn" onclick="copyExportCode()">📋 复制代码</button>
        <button class="btn" onclick="closeExportPanel()">完成</button>
    </div>
    <div class="game-over" id="game-over">
        <h2 id="game-over-title">游戏结束</h2>
        <p id="game-over-msg"></p>
        <p>达到回合: <span id="final-round">0</span></p>
        <button class="btn" onclick="restartGame()" style="margin-top:20px">🔄 重新开始</button>
    </div>
<script>
const VERSION = 'v1.74';

function initState(){
    const oldSpeed=S.battleSpeed||1;
    const oldMode=S.lobsterMode;
    const oldExported=S.exported||false;
    S={round:1,phase:0,turn:0,inBattle:false,battleResult:null,pendingEnemySkill:null,turnOrder:null,battleSpeed:oldSpeed,
        playerCooldowns:{},enemyCooldowns:{},battleQueue:[],isProcessing:false,lobsterMode:oldMode,exported:oldExported,
        player:(()=>{
            const bhp=Math.floor(110+Math.random()*20);
            const batk=Math.floor(9+Math.random()*3);
            const bdef=Math.floor(4+Math.random()*3);
            const bspd=Math.floor(5+Math.random()*8);
            const cnt=Math.random()<0.9?2:3;
            const s=[];while(s.length<cnt){const r=ALL_SKILLS[Math.floor(Math.random()*ALL_SKILLS.length)];if(!s.find(x=>x.id===r.id))s.push(Object.assign({},r));}
            return{
                name:'你的龙虾',level:1,
                hp:bhp,maxHp:bhp,atk:batk,def:bdef,spd:bspd,
                baseHp:bhp,baseAtk:batk,baseDef:bdef,baseSpd:bspd,

                equipment:{atk:null,def:null,hp:null},inventory:[]
            };
        })(),enemy:null};

function cloneSkill(s){return JSON.parse(JSON.stringify(s))}
function getPhaseMult(){return PHASE_STAT_MULT[S.phase]}
function calcPlayerStats(){
    const m=getPhaseMult();
    const bhp=(S.player.baseHp||100)+(S.player.level-1)*15;
    const bAtk=(S.player.baseAtk||10)+(S.player.level-1)*2;
    const bDef=(S.player.baseDef||4)+(S.player.level-1)*1;
    const bSpd=(S.player.baseSpd||6)+(S.player.level-1)*1;
    const hpM=S.player.defReduced?0.9:1,atkM=S.player.defReduced?0.9:1;
    // 装备加成
    const equipBonus={atk:0,def:0,hp:0};
    if(S.player.equipment.atk){const e=S.player.equipment.atk;equipBonus.atk=Math.floor(EQUIP_BASE_VALUES.atk*(EQUIP_QUALITY_MULT[e.quality]||1)*(e.level||1));}
    if(S.player.equipment.def){const e=S.player.equipment.def;equipBonus.def=Math.floor(EQUIP_BASE_VALUES.def*(EQUIP_QUALITY_MULT[e.quality]||1)*(e.level||1));}
    if(S.player.equipment.hp){const e=S.player.equipment.hp;equipBonus.hp=Math.floor(EQUIP_BASE_VALUES.hp*(EQUIP_QUALITY_MULT[e.quality]||1)*(e.level||1));}
    S.player.maxHp=Math.floor((bhp+equipBonus.hp)*m*hpM);
    S.player.atk=Math.floor((bAtk+equipBonus.atk)*m*atkM);
    S.player.def=Math.floor((bDef+equipBonus.def)*m);
    const effectiveSpd=S.player.speedBoosted?bSpd*m*1.5:bSpd*m;
    S.player.spd=Math.floor(effectiveSpd);
    if(S.player.hp>S.player.maxHp)S.player.hp=S.player.maxHp;
}
function generateEnemy(){
    const r=S.round;
    // 前3回合为简单模式，敌人属性降低
    const easyMod=r<=3?0.6:r<=5?0.8:1;
    const m=(1+(r-1)*0.15)*easyMod;
    const e={
        name:ENEMY_NAMES[Math.min(r-1,ENEMY_NAMES.length-1)]||'强化龙虾#'+r,
        level:r,hp:Math.floor((100+r*15)*m),maxHp:Math.floor((100+r*15)*m),
        atk:Math.floor((7+r*1.3)*m),def:Math.floor((3+r*0.8)*m),spd:Math.floor((5+r*0.6)*m),
        skills:[],buffs:[],shields:0,poisonDmg:0,alive:true,resurrected:false,
        stunned:false,sealed:false,resurrectRate:0,counterRate:0,reduceDmgRate:0,
        speedBoosted:false,defReduced:false
    };
    const cnt=r+Math.floor(Math.random()*2); // Round r: r to r+1 skills
    const avail=ALL_SKILLS.filter(x=>x.id!=='resurrect'||Math.random()<0.2);
    const sh=[...avail].sort(()=>Math.random()-0.5);
    for(let i=0;i<Math.min(cnt,sh.length);i++) e.skills.push(cloneSkill(sh[i]));
    S.enemy=e;
}

// 特效函数
function showDamageNumber(element, value, type) {
    const rect = element.getBoundingClientRect();
    const dmgEl = document.createElement('div');
    dmgEl.className = 'damage-number ' + type;
    dmgEl.textContent = (type === 'heal' ? '+' : '-') + value;
    dmgEl.style.left = (rect.left + rect.width / 2 - 30 + Math.random() * 20 - 10) + 'px';
    dmgEl.style.top = (rect.top + 40) + 'px';
    document.body.appendChild(dmgEl);
    setTimeout(() => dmgEl.remove(), 1000);
}

function playAttackAnimation(attackerId, targetId, isCrit) {
    const attacker = document.getElementById(attackerId);
    const target = document.getElementById(targetId);
    const animClass = attackerId === 'player-fighter' ? 'attacking-right' : 'enemy-attacking-left';
    
    attacker.classList.add(animClass);
    setTimeout(() => {
        attacker.classList.remove(animClass);
        if (target) {
            target.classList.add('hit-flash');
            // 攻击时震屏
            playScreenShake(targetId==='player-fighter'?'player':'enemy');
            if (isCrit) {
                target.classList.add('crit-effect');
                // 暴击时屏幕闪烁
                document.body.classList.add('crit-flash');
                setTimeout(() => document.body.classList.remove('crit-flash'), 300);
                setTimeout(() => target.classList.remove('crit-effect'), 500);
            }
            setTimeout(() => target.classList.remove('hit-flash'), 300);
        }
    }, 300);
}

function playScreenShake(targetFighter) {
    const arena=document.getElementById('arena');
    arena.classList.add('screen-shake');
    setTimeout(()=>arena.classList.remove('screen-shake'),200);
}

function playResurrectAnimation(element) {
    element.classList.add('resurrect-effect');
    setTimeout(() => element.classList.remove('resurrect-effect'), 800);
}

function showSkillPopup(skillId) {
    const skill=ALL_SKILLS.find(s=>s.id===skillId);
    if(!skill) return;
    document.getElementById('skill-popup-icon').textContent=skill.icon;
    document.getElementById('skill-popup-name').textContent=skill.name;
    document.getElementById('skill-popup-type').textContent='类型: '+(skill.type==='attack'?'攻击':skill.type==='defense'?'防御':'特殊');
    document.getElementById('skill-popup-cost').textContent='冷却: '+(skill.cd||0)+'回合';
    document.getElementById('skill-popup-desc').textContent=skill.desc;
    let effect='';
    if(skill.minDmg>0) effect+='伤害倍率'+(skill.minDmg*100).toFixed(0)+'%';
    if(skill.critRate) effect+=(effect?' | ':'')+'暴击率'+(skill.critRate*100).toFixed(0)+'%'+(skill.critMult?' 倍率'+skill.critMult+'倍':'');
    if(skill.lifesteal) effect+=(effect?' | ':'')+'吸血'+(skill.lifesteal*100).toFixed(0)+'%';
    if(skill.poisonDmg) effect+=(effect?' | ':'')+'每回合中毒'+(skill.poisonDmg*100).toFixed(0)+'%';
    if(skill.stunRate) effect+=(effect?' | ':'')+'眩晕率'+(skill.stunRate*100).toFixed(0)+'%';
    if(skill.sealRate) effect+=(effect?' | ':'')+'封印率'+(skill.sealRate*100).toFixed(0)+'%';
    if(skill.shield) effect+=(effect?' | ':'')+'护盾'+skill.shield+'层';
    if(skill.reduceDmg) effect+=(effect?' | ':'')+'减伤'+(skill.reduceDmg*100).toFixed(0)+'%';
    if(skill.counterRate) effect+=(effect?' | ':'')+'反击率'+(skill.counterRate*100).toFixed(0)+'%';
    if(skill.resurrectRate) effect+=(effect?' | ':'')+'复活率'+(skill.resurrectRate*100).toFixed(0)+'%';
    if(skill.speedBoost) effect+=(effect?' | ':'')+'速度翻倍';
    if(skill.drain) effect+=(effect?' | ':'')+'吸取'+(skill.drain*100).toFixed(0)+'%HP';
    if(skill.ignoreDef) effect+=(effect?' | ':'')+'无视防御';
    if(skill.reduceStat) effect+=(effect?' | ':'')+'属性降低';
    document.getElementById('skill-popup-effect').textContent=effect||'无特殊效果';
    document.getElementById('skill-popup').classList.add('show');
    document.getElementById('skill-backdrop').classList.add('show');
}

function hideSkillPopup() {
    document.getElementById('skill-popup').classList.remove('show');
    document.getElementById('skill-backdrop').classList.remove('show');
    document.getElementById('skill-tooltip').classList.remove('show');
}

function showSkillTooltip(skillId) {
    const skill=ALL_SKILLS.find(s=>s.id===skillId);
    if(!skill) return;
    document.getElementById('skill-tooltip-name').textContent=skill.icon+' '+skill.name;
    document.getElementById('skill-tooltip-desc').textContent=skill.desc;
    const tooltip=document.getElementById('skill-tooltip');
    tooltip.classList.add('show');
    const event=window.event;
    if(event && event.target) {
        const rect=event.target.getBoundingClientRect();
        tooltip.style.left=(rect.left+rect.width/2-100)+'px';
        tooltip.style.top=(rect.bottom+5)+'px';
    }
}

function hideSkillTooltip() {
    document.getElementById('skill-tooltip').classList.remove('show');
}

function updateAutoIndicator() {
    const indicator=document.getElementById('auto-indicator');
    indicator.classList.add('active');
}

function toggleSpeed() {
    S.battleSpeed = S.battleSpeed === 1 ? 2 : 1;
    updateSpeedButton();
}

function updateSpeedButton() {
    const btn = document.getElementById('btn-speed');
    if(S.battleSpeed === 2) {
        btn.textContent = '⏩ 2倍速 (点击切换)';
        btn.classList.add('btn-warning');
    } else {
        btn.textContent = '⏩ 1倍速 (点击切换)';
        btn.classList.remove('btn-warning');
    }
}

function getBattleDelay() {
    return AUTO_BATTLE_DELAY / S.battleSpeed;
}

function addLog(msg) {
    const log=document.getElementById('battle-log');
    const e=document.createElement('div');
    e.className='log-entry';
    e.innerHTML=msg;
    log.insertBefore(e, log.firstChild);
    while(log.children.length>50) log.removeChild(log.lastChild);
}

function updateUI() {
    if(!S.player) return;
    document.getElementById('round-num').textContent=S.round;
    document.getElementById('phase').textContent=PHASES[S.phase];
    document.getElementById('level').textContent=S.player.level;
    updatePlayerUI();
    updateEnemyUI();
    updateEvolveButton();
    updateAutoIndicator();
}

function updatePlayerUI() {
    if(!S.player || !S.player.skills) return;
    const sprite=document.getElementById('player-sprite');
    sprite.textContent=PHASE_SPRITES[S.phase];
    const hpPct=S.player.hp/S.player.maxHp*100;
    let spriteClass='fighter-sprite lobster-phase-'+S.phase;
    if(hpPct<30 && hpPct>0) spriteClass+=' low-hp-warning';
    sprite.className=spriteClass;
    document.getElementById('player-name').textContent=S.player.name;
    document.getElementById('player-level').textContent='Lv.'+S.player.level;
    const hpBar=document.getElementById('player-hp-bar');
    hpBar.style.width=hpPct+'%';
    hpBar.className='hp-fill'+(hpPct>50?' green':'');
    document.getElementById('player-hp').textContent=Math.max(0,Math.floor(S.player.hp));
    document.getElementById('player-max-hp').textContent=S.player.maxHp;
    document.getElementById('player-stats').textContent='攻:'+S.player.atk+' 防:'+S.player.def+' 速:'+S.player.spd;
    document.getElementById('player-skills').innerHTML='技能: '+S.player.skills.map(s=>{
        const cd=S.playerCooldowns[s.id]||0;
        const cdClass=cd>0?'on-cd':'';
        const passiveClass=s.passive?'passive-skill':'';
        return '<span class="skill-item '+cdClass+' '+passiveClass+'" '+(cd>0?'data-cd="'+cd+'" ':'')+'onmouseenter="showSkillTooltip(\''+s.id+'\')" onmouseleave="hideSkillTooltip()" onclick="showSkillPopup(\''+s.id+'\')">'+s.icon+'</span>';
    }).join(' ');
    updateBuffsDisplay('player-buffs', S.player);
}

function updateEnemyUI() {
    if(!S.enemy) {
        // 清空敌人显示
        document.getElementById('enemy-sprite').textContent='🦞';
        document.getElementById('enemy-sprite').className='enemy-sprite';
        document.getElementById('enemy-name').textContent='???';
        document.getElementById('enemy-level').textContent='';
        document.getElementById('enemy-hp-bar').style.width='0%';
        document.getElementById('enemy-hp').textContent='0';
        document.getElementById('enemy-max-hp').textContent='0';
        document.getElementById('enemy-stats').textContent='攻:0 防:0 速:0';
        document.getElementById('enemy-buffs').innerHTML='';
        document.getElementById('enemy-skills').innerHTML='';
        return;
    }
    document.getElementById('enemy-sprite').textContent='🦞';
    document.getElementById('enemy-sprite').className='enemy-sprite';
    document.getElementById('enemy-name').textContent=S.enemy.name;
    document.getElementById('enemy-level').textContent='Lv.'+S.enemy.level;
    const hpPct=S.enemy.hp/S.enemy.maxHp*100;
    const hpBar=document.getElementById('enemy-hp-bar');
    hpBar.style.width=hpPct+'%';
    hpBar.className='hp-fill'+(hpPct>50?' green':'');
    document.getElementById('enemy-hp').textContent=Math.max(0,Math.floor(S.enemy.hp));
    document.getElementById('enemy-max-hp').textContent=S.enemy.maxHp;
    document.getElementById('enemy-stats').textContent='攻:'+S.enemy.atk+' 防:'+S.enemy.def+' 速:'+S.enemy.spd;
    updateBuffsDisplay('enemy-buffs', S.enemy);
    document.getElementById('enemy-skills').innerHTML='技能: '+S.enemy.skills.map(s=>{
        const cd=S.enemyCooldowns[s.id]||0;
        const cdClass=cd>0?'on-cd':'';
        return '<span class="skill-item '+cdClass+'" '+(cd>0?'data-cd="'+cd+'" ':'')+'onmouseenter="showSkillTooltip(\''+s.id+'\')" onmouseleave="hideSkillTooltip()" onclick="showSkillPopup(\''+s.id+'\')">'+s.icon+'</span>';
    }).join(' ');
}

function updateBuffsDisplay(id, entity) {
    const container=document.getElementById(id);
    container.innerHTML='';
    entity.buffs.forEach(b=>{
        const tag=document.createElement('span');
        tag.className='buff-tag buff-'+b.type;
        tag.textContent=b.icon+' '+b.name;
        container.appendChild(tag);
    });
    if(entity.shields>0) {
        const tag=document.createElement('span');
        tag.className='buff-tag buff-shield';
        tag.textContent='🔰 '+entity.shields;
        container.appendChild(tag);
    }
}


function startBattle() {
    if(S.inBattle) return;
    showEnemySelect();
}

function showEnemySelect() {
    const list=document.getElementById('enemy-select-list');
    list.innerHTML='';
    for(let i=0;i<3;i++) {
        const r=S.round+(i*0.5);
        const easyMod=r<=3?0.6:r<=5?0.8:1;
        const m=(1+(r-1)*0.15)*easyMod;
        const nameOpt=ENEMY_NAMES[Math.min(Math.floor(r)-1,ENEMY_NAMES.length-1)]||'强化龙虾#'+Math.floor(r);
        const hp=Math.floor((100+r*15)*m);
        const atk=Math.floor((7+r*1.3)*m);
        const def=Math.floor((3+r*0.8)*m);
        const spd=Math.floor((5+r*0.6)*m);
        const cnt=S.round+(i===2?1:0); // 前2敌人round技能，第3敌人round+1技能
        const avail=ALL_SKILLS.filter(x=>x.id!=='resurrect'||Math.random()<0.2);
        const skills=[...avail].sort(()=>Math.random()-0.5).slice(0,Math.min(cnt,avail.length));
        const div=document.createElement('div');
        div.className='enemy-option';
        div.innerHTML='<div class="enemy-option-name">🦞 '+nameOpt+' (Lv.'+Math.floor(r)+')</div>'+
            '<div class="enemy-option-stats">生命:'+hp+' 攻:'+atk+' 防:'+def+' 速:'+spd+'</div>'+
            '<div class="enemy-option-skills">技能: '+skills.map(s=>s.icon+s.name).join(' ')+'</div>';
        div.onclick=()=>selectEnemy(nameOpt,Math.floor(r),hp,atk,def,spd,skills);
        list.appendChild(div);
    }
    document.getElementById('enemy-select-panel').classList.add('show');
}

function closeEnemySelect() {
    document.getElementById('enemy-select-panel').classList.remove('show');
}

function selectEnemy(name,level,hp,atk,def,spd,skills) {
    closeEnemySelect();
    // 玩家血量回满
    S.player.hp=S.player.maxHp;
    S.player.poisonDmg=0;
    S.player.shields=0;
    S.player.stunned=false;
    S.player.sealed=false;
    S.enemy={
        name:name,level:level,hp:hp,maxHp:hp,
        atk:atk,def:def,spd:spd,
        skills:skills.map(s=>cloneSkill(s)),
        buffs:[],shields:0,poisonDmg:0,alive:true,resurrected:false,
        stunned:false,sealed:false,resurrectRate:0,counterRate:0,reduceDmgRate:0,
        speedBoosted:false,defReduced:false,lifesteal:0
    };
    // 刷新敌人被动
    S.enemy.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.enemy.lifesteal=s.lifesteal;
            if(s.id==='counter') S.enemy.counterRate=s.counterRate;
            if(s.id==='resurrect') S.enemy.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.enemy.speedBoosted=true;
        }
    });
    // 重置玩家CD
    S.playerCooldowns={};
    S.enemyCooldowns={};
    // 刷新玩家被动
    S.player.lifesteal=0;S.player.counterRate=0;S.player.resurrectRate=0;
    S.player.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.player.lifesteal=s.lifesteal;
            if(s.id==='counter') S.player.counterRate=s.counterRate;
            if(s.id==='resurrect') S.player.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.player.speedBoosted=true;
        }
    });
    S.inBattle=true;
    S.turn=0;
    document.getElementById('btn-start').disabled=true;
    updateUI();
    addLog('<span class="log-system">⚔️ 第 '+S.round+' 轮战斗开始!</span>');
    addLog('<span class="log-enemy">⚔️ 遇到野生 '+S.enemy.name+' (Lv.'+S.enemy.level+')</span>');
    addLog('<span class="log-system">📋 敌人技能: '+S.enemy.skills.map(s=>s.icon+s.name).join(' ')+'</span>');
    S.turn=1;
    addLog('<span class="log-turn">━━━ 第 1 回合 ━━━</span>');
    setTimeout(executeAutoTurn, getBattleDelay());
}

function executeAutoTurn() {
    if(!S.inBattle) return;
    if(S.player.stunned) {
        addLog('<span class="log-player">😵 被晕了，无法行动!</span>');
        updateUI();
        setTimeout(()=>enemyTurn(),getBattleDelay());
        return;
    }
    if(S.player.sealed) {
        addLog('<span class="log-player">🔒 被封印了，无法行动!</span>');
        S.player.sealed=false;
        updateUI();
        setTimeout(()=>enemyTurn(),getBattleDelay());
        return;
    }
    // 收集可用技能（排除被动、排除CD中的）
    const availSkills=S.player.skills.filter(s=>{
        if(s.passive) return false;
        const cd=S.playerCooldowns[s.id]||0;
        if(cd>0) return false;
        return true;
    });
    
    // 构建行动队列
    S.battleQueue=[];
    
    // 添加技能到队列
    availSkills.forEach(skill=>{
        S.battleQueue.push({type:'skill',skill:skill,isPlayer:true});
    });
    
    // 添加平A到队列
    S.battleQueue.push({type:'attack',isPlayer:true});
    
    S.isProcessing=true;
    processBattleQueue();
}

function processBattleQueue() {
    if(!S.inBattle || S.battleQueue.length===0) {
        S.isProcessing=false;
        if(S.enemy) {
            S.enemy.hp=Math.max(0,S.enemy.hp);
        }
        S.player.hp=Math.min(S.player.maxHp,S.player.hp);
        updateUI();
        if(S.enemy && S.enemy.hp<=0) {
            enemyDefeated();
        } else if(S.player.hp<=0) {
            playerDefeated();
        } else if(S.inBattle) {
            setTimeout(()=>enemyTurn(),getBattleDelay());
        }
        return;
    }
    
    const action=S.battleQueue.shift();
    const delay=getBattleDelay();
    
    if(action.type==='skill') {
        const skill=action.skill;
        if(skill.cd>0) S.playerCooldowns[skill.id]=skill.cd;
        addLog('<span class="log-player">🎯 '+S.player.name+' 使用 【'+skill.icon+skill.name+'】</span>');
        processSkillEffect(skill,S.player,S.enemy,true);
        updateUI();
        setTimeout(processBattleQueue,delay);
    } else if(action.type==='attack') {
        // 普通攻击
        doNormalAttack(S.player,S.enemy,true,false);
        updateUI();
        setTimeout(processBattleQueue,delay);
    }
}

function doNormalAttack(attacker, defender, isPlayer, isSecondHit) {
    let atkDmg=Math.max(1,Math.floor((attacker.atk||0)*1.0));
    // 连击第二次伤害减半
    if(isSecondHit) {
        atkDmg=Math.floor(atkDmg*0.5);
    }
    // 善恶有报处理
    const karmaSkill=attacker.skills.find(s=>s.id==='karma'&&s.passive);
    if(karmaSkill&&atkDmg>0) {
        if(Math.random()<0.2) {
            // 20%概率治疗敌人
            const healAmt=Math.floor(defender.maxHp*0.1);
            defender.hp=Math.min(defender.maxHp,defender.hp+healAmt);
            addLog('<span class="log-system">⚖️ 【善恶有报】触发! 治疗敌人 '+healAmt+' HP</span>');
            playAttackAnimation(isPlayer?'player-fighter':'enemy-fighter',isPlayer?'enemy-fighter':'player-fighter',false);
            return;
        } else {
            // 80%概率双倍伤害
            atkDmg*=2;
        }
    }
    // 愤怒处理：HP越低伤害越高
    const angerSkill=attacker.skills.find(s=>s.id==='anger'&&s.passive);
    if(angerSkill&&atkDmg>0) {
        const hpPct=attacker.hp/attacker.maxHp;
        if(hpPct<0.5) {
            const angerBoost=1+(0.5-hpPct)*2; // 50%HP时×1，25%HP时×1.5，1%HP时×2
            atkDmg=Math.floor(atkDmg*angerBoost);
            addLog('<span class="log-system">😤 【愤怒】激活! 伤害×'+angerBoost.toFixed(1)+'</span>');
        }
    }
    // 护盾吸收
    if(defender.shields>0) {
        const absorb=Math.min(defender.shields,atkDmg);
        defender.shields-=absorb;
        atkDmg-=absorb;
        if(absorb>0) addLog('<span class="log-system">🛡️ 护盾吸收了 '+absorb+' 伤害</span>');
    }
    defender.hp-=atkDmg;
    const hitType=isSecondHit?'（连击第2次）':'';
    addLog('<span class="log-'+(isPlayer?'player':'enemy')+'">👊 '+(isPlayer?attacker.name:'敌人')+'普通攻击'+hitType+'造成 '+atkDmg+' 伤害</span>');
    showDamageNumber(document.getElementById(isPlayer?'enemy-fighter':'player-fighter'),atkDmg,'');
    playAttackAnimation(isPlayer?'player-fighter':'enemy-fighter',isPlayer?'enemy-fighter':'player-fighter',false);
    // 吸血被动
    if(attacker.lifesteal>0) {
        const heal=Math.floor(atkDmg*attacker.lifesteal);
        attacker.hp=Math.min(attacker.maxHp,attacker.hp+heal);
        addLog('<span class="log-heal">💉 【吸血】 回复 '+heal+' HP</span>');
    }
}

// 带必杀判断的攻击（连击用）


function processSkillEffect(skill, attacker, defender, isPlayer) {
    let totalDmg=0;
    const times=skill.times||1;
    const isCrit=Math.random()<(skill.critRate||0);
    const critMult=isCrit?(skill.critMult||2):1;
    // 检查善恶有报
    const karmaSkill=attacker.skills.find(s=>s.id==='karma'&&s.passive);
    const karmaMult=karmaSkill?(Math.random()<0.8?2:0):1; // 0表示治疗敌人
    const karmaHeal=karmaSkill?(Math.random()<0.8?false:true):false;
    for(let t=0;t<times;t++) {
        let dmg=0;
        if(skill.type==='attack'&&(skill.minDmg||skill.minDmg===0)) {
            dmg=Math.max(1,Math.floor((attacker.atk||0)*skill.minDmg*critMult));
        }
        // 善恶有报处理
        if(karmaSkill&&dmg>0) {
            if(karmaHeal) {
                // 20%概率治疗敌人
                const healAmt=Math.floor(defender.maxHp*0.1);
                defender.hp=Math.min(defender.maxHp,defender.hp+healAmt);
                addLog('<span class="log-system">⚖️ 【善恶有报】触发! 治疗敌人 '+healAmt+' HP</span>');
                continue; // 不造成伤害
            } else {
                // 80%概率双倍伤害
                dmg*=2;
            }
        }
        // 愤怒处理
        const angerSkill=attacker.skills.find(s=>s.id==='anger'&&s.passive);
        if(angerSkill&&dmg>0) {
            const hpPct=attacker.hp/attacker.maxHp;
            if(hpPct<0.5) {
                const angerBoost=1+(0.5-hpPct)*2;
                dmg=Math.floor(dmg*angerBoost);
            }
        }
        if(skill.drain) {
            const drainAmt=Math.floor((defender.hp||0)*skill.drain);
            defender.hp-=drainAmt;
            attacker.hp=Math.min(attacker.maxHp,(attacker.hp||0)+drainAmt);
            addLog('<span class="log-heal">'+(isPlayer?'我':'敌')+' 吸取 '+drainAmt+' HP</span>');
        }
        if(skill.lifesteal) {
            const healAmt=Math.floor((dmg||0)*skill.lifesteal);
            attacker.hp=Math.min(attacker.maxHp,(attacker.hp||0)+healAmt);
            addLog('<span class="log-heal">'+(isPlayer?'我':'敌')+' 吸血 '+healAmt+' HP</span>');
        }
        if(skill.ignoreDef) {
            defender.hp-=dmg;
            totalDmg+=dmg;
        } else {
            const def=defender.def||0;
            const finalDmg=Math.max(1,Math.floor(dmg*(1-def/(dmg+100))));
            defender.hp-=finalDmg;
            totalDmg+=finalDmg;
        }
        if(isPlayer&&dmg>0) showDamageNumber(document.getElementById('enemy-fighter'), dmg+(isCrit?' 💥':''), isCrit?'crit':'damage');
        if(!isPlayer&&dmg>0) showDamageNumber(document.getElementById('player-fighter'), dmg+(isCrit?' 💥':''), isCrit?'crit':'damage');
    }
    if(isCrit&&totalDmg>0) addLog('<span class="log-crit">💥 暴击! 造成 '+totalDmg+' 伤害</span>');
    else if(totalDmg>0) addLog('<span class="log-damage">'+(isPlayer?'对敌':'对你')+'造成 '+totalDmg+' 伤害</span>');
    if(skill.poisonDmg) {
        defender.poisonDmg=(defender.poisonDmg||0)+skill.poisonDmg;
        addLog('<span class="log-damage">'+(isPlayer?'敌':'我')+' 中了剧毒!</span>');
    }
    if(skill.stunRate&&Math.random()<skill.stunRate) {
        defender.stunned=true;
        addLog('<span class="log-system">'+(isPlayer?'敌':'我')+' 被晕了!</span>');
    }
    if(skill.sealRate&&Math.random()<skill.sealRate) {
        defender.sealed=true;
        addLog('<span class="log-system">'+(isPlayer?'敌':'我')+' 被封印了!</span>');
    }
    if(skill.reduceDmg) {
        defender.reduceDmgRate=(defender.reduceDmgRate||0)+skill.reduceDmg;
    }
    if(skill.speedBoost) {
        attacker.speedBoosted=true;
        addLog('<span class="log-system">'+(isPlayer?'我':'敌')+' 速度翻倍!</span>');
    }
    if(skill.shield) {
        attacker.shields=(attacker.shields||0)+skill.shield;
        addLog('<span class="log-system">'+(isPlayer?'我':'敌')+' 获得 '+skill.shield+' 层护盾!</span>');
    }
    if(skill.counterRate) {
        attacker.counterRate=skill.counterRate;
    }
    if(skill.resurrectRate) {
        attacker.resurrectRate=skill.resurrectRate;
    }
    if(skill.reduceStat) {
        defender.defReduced=true;
    }
    if(isPlayer) playAttackAnimation('player-fighter','enemy-fighter',isCrit);
    else playAttackAnimation('enemy-fighter','player-fighter',isCrit);
    attacker.hp=Math.min(attacker.maxHp,attacker.hp);
    defender.hp=Math.max(0,defender.hp);
    return totalDmg;
}

function enemyTurn() {
    if(!S.inBattle || !S.enemy) return;
    if(S.enemy.hp<=0) {
        enemyDefeated();
        return;
    }
    if(S.enemy.stunned) {
        addLog('<span class="log-enemy">😵 敌人被晕了，无法行动!</span>');
        S.enemy.stunned=false;
        updateUI();
        setTimeout(()=>endTurn(),getBattleDelay());
        return;
    }
    if(S.enemy.sealed) {
        addLog('<span class="log-enemy">🔒 敌人被封印了，无法行动!</span>');
        S.enemy.sealed=false;
        updateUI();
        setTimeout(()=>endTurn(),getBattleDelay());
        return;
    }
    // 收集可用技能（只检查CD）
    const availSkills=S.enemy.skills.filter(s=>{
        if(s.passive) return false;
        const cd=S.enemyCooldowns[s.id]||0;
        if(cd>0) return false;
        return true;
    });
    
    // 构建敌人行动队列（普通攻击必定执行）
    S.battleQueue=[];
    
    // 添加技能到队列
    availSkills.forEach(skill=>{
        S.battleQueue.push({type:'skill',skill:skill,isPlayer:false});
    });
    
    // 添加平A到队列
    // 普通攻击免费，每个回合必定执行
    S.battleQueue.push({type:'attack',isPlayer:false});
    
    processEnemyQueue();
}

function processEnemyQueue() {
    if(!S.inBattle || S.battleQueue.length===0) {
        if(S.enemy) {
            S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp);
        }
        S.player.hp=Math.max(0,S.player.hp);
        updateUI();
        if(S.player.hp<=0) {
            playerDefeated();
        } else if(S.enemy && S.enemy.hp<=0) {
            enemyDefeated();
        } else if(S.inBattle) {
            setTimeout(()=>endTurn(),getBattleDelay());
        }
        return;
    }
    
    const action=S.battleQueue.shift();
    const delay=getBattleDelay();
    
    if(action.type==='skill') {
        const skill=action.skill;
        if(skill.cd>0) S.enemyCooldowns[skill.id]=skill.cd;
        addLog('<span class="log-enemy">🎯 '+S.enemy.name+' 使用 【'+skill.icon+skill.name+'】</span>');
        processSkillEffect(skill,S.enemy,S.player,false);
        updateUI();
        setTimeout(processEnemyQueue,delay);
    } else if(action.type==='attack') {
        // 普通攻击
        doNormalAttack(S.enemy,S.player,false,false);
        updateUI();
        setTimeout(processEnemyQueue,delay);
    }
}

function endTurn() {
    if(!S.inBattle) return;
    // 减少CD
    for(let id in S.playerCooldowns) {
        if(S.playerCooldowns[id]>0) S.playerCooldowns[id]--;
    }
    for(let id in S.enemyCooldowns) {
        if(S.enemyCooldowns[id]>0) S.enemyCooldowns[id]--;
    }
    // 刷新被动状态
    S.player.lifesteal=0;S.player.counterRate=0;S.player.resurrectRate=0;S.player.speedBoosted=false;
    S.player.skills.forEach(s=>{
        if(s.passive) {
            if(s.id==='lifesteal') S.player.lifesteal=s.lifesteal;
            if(s.id==='counter') S.player.counterRate=s.counterRate;
            if(s.id==='resurrect') S.player.resurrectRate=s.resurrectRate;
            if(s.id==='speedBoost'||s.id==='overclock') S.player.speedBoosted=true;
        }
    });
    if(S.enemy) {
        S.enemy.lifesteal=0;S.enemy.counterRate=0;S.enemy.resurrectRate=0;S.enemy.speedBoosted=false;
        S.enemy.skills.forEach(s=>{
            if(s.passive) {
                if(s.id==='lifesteal') S.enemy.lifesteal=s.lifesteal;
                if(s.id==='counter') S.enemy.counterRate=s.counterRate;
                if(s.id==='resurrect') S.enemy.resurrectRate=s.resurrectRate;
                if(s.id==='speedBoost'||s.id==='overclock') S.enemy.speedBoosted=true;
            }
        });
    }
    // 毒伤
    if(S.player.poisonDmg>0) {
        const pDmg=Math.floor(S.player.maxHp*S.player.poisonDmg);
        S.player.hp-=pDmg;
        addLog('<span class="log-damage">🔥 【中毒】你的龙虾受到 '+pDmg+' 伤害</span>');
        showDamageNumber(document.getElementById('player-fighter'), pDmg, 'poison');
    }
    if(S.enemy && S.enemy.poisonDmg>0) {
        const eDmg=Math.floor(S.enemy.maxHp*S.enemy.poisonDmg);
        S.enemy.hp-=eDmg;
        addLog('<span class="log-damage">🔥 【中毒】敌人受到 '+eDmg+' 伤害</span>');
    }
    if(S.player.defReduced&&Math.random()<0.3) S.player.defReduced=false;
    if(S.enemy && S.enemy.defReduced&&Math.random()<0.3) S.enemy.defReduced=false;
    S.player.buffs=[];
    if(S.enemy) S.enemy.buffs=[];
    updateUI();
    if(S.player.hp<=0) {
        playerDefeated();
        return;
    }
    if(S.enemy && S.enemy.hp<=0) {
        enemyDefeated();
        return;
    }
    addLog('<span class="log-turn">━━━ 第 '+(S.turn+1)+' 回合 ━━━</span>');
    S.turn++;
    setTimeout(executeAutoTurn, getBattleDelay());
}

function enemyDefeated() {
    S.inBattle=false;
    S.battleResult='win';
    // 战胜敌人直接升级
    S.player.level++;
    const oldPhase=S.phase;
    if(S.player.level<PHASES.length) {
        S.phase=S.player.level-1;
    }
    calcPlayerStats();
    S.player.hp=S.player.maxHp;
    addLog('<span class="log-system">🎉 胜利! 升级到 '+PHASES[S.phase]+'!</span>');
    // 50%概率领悟随机技能
    if(Math.random()<0.5) {
        const avail=ALL_SKILLS.filter(s=>!S.player.skills.find(p=>p.id===s.id));
        if(avail.length>0) {
            const newSkill=cloneSkill(avail[Math.floor(Math.random()*avail.length)]);
            S.player.skills.push(newSkill);
            addLog('<span class="log-player">🌟 升级领悟: 获得 【'+newSkill.icon+newSkill.name+'】!</span>');
        }
    }
    if(S.enemy && S.enemy.skills.length>0) {
        // 必定偷取敌人第一个玩家没有的技能
        let newSkill=null;
        for(const s of S.enemy.skills) {
            if(!S.player.skills.find(p=>p.id===s.id)) {
                newSkill=cloneSkill(s);
                break;
            }
        }
        if(newSkill) {
            S.player.skills.push(newSkill);
            addLog('<span class="log-player">🌟 偷学到新技能: '+newSkill.icon+newSkill.name+'</span>');
            document.getElementById('reward-skill-name').textContent=newSkill.icon+newSkill.name;
            document.getElementById('reward-skill-container').style.display='block';
        } else {
            document.getElementById('reward-skill-container').style.display='none';
        }
    } else {
        document.getElementById('reward-skill-container').style.display='none';
    }
    // 装备掉落检查
    if(Math.random()<DROP_CHANCE) {
        const dropEquip=generateEquipment();
        S.player.inventory.push(dropEquip);
        addLog('<span class="log-system">📦 获得掉落装备: '+dropEquip.icon+dropEquip.name+' ['+EQUIP_QUALITY[dropEquip.quality]+']</span>');
        document.getElementById('reward-equip-container').style.display='block';
        document.getElementById('reward-equip-name').innerHTML=dropEquip.icon+dropEquip.name+' ['+EQUIP_QUALITY[dropEquip.quality]+'] +'+getEquipValue(dropEquip)+EQUIP_NAMES[dropEquip.type].desc;
    } else {
        document.getElementById('reward-equip-container').style.display='none';
    }
    document.getElementById('reward-panel').classList.add('show');
    document.getElementById('btn-start').disabled=false;
    S.round++;
    // 养虾模式完成5轮后显示导出面板
    if(S.lobsterMode==='raise' && S.round>5 && !S.exported) {
        S.exported=true; // 防止重复显示
        setTimeout(()=>{
            document.getElementById('reward-panel').classList.remove('show');
            showExportPanel();
        }, 500);
    }
    updateUI();
}

function generateEquipment() {
    const type=EQUIP_TYPES[Math.floor(Math.random()*EQUIP_TYPES.length)];
    const quality=Math.floor(Math.random()*Math.min(3+S.round*0.3,5));
    const level=1+Math.min(Math.floor(S.round/2),10);
    const name=EQUIP_NAMES[type].name+' Lv.'+level;
    return {type,quality,level,name,icon:EQUIP_NAMES[type].icon};
}

function getEquipValue(e) {
    return Math.floor(EQUIP_BASE_VALUES[e.type]*EQUIP_QUALITY_MULT[e.quality]*e.level);
}

function playerDefeated() {
    if(S.player.resurrectRate>0&&!S.player.resurrectUsed&&Math.random()<S.player.resurrectRate) {
        S.player.hp=Math.floor(S.player.maxHp*0.5);
        S.player.resurrectUsed=true;
        playResurrectAnimation(document.getElementById('player-fighter'));
        addLog('<span class="log-player">✨ 神佑发动! 复活并恢复 50% HP!</span>');
        updateUI();
        return;
    }
    S.inBattle=false;
    S.battleResult='lose';
    addLog('<span class="log-system">💀 败北...</span>');
    document.getElementById('game-over-title').textContent='游戏结束';
    document.getElementById('game-over-msg').textContent='你的龙虾在第 '+S.round+' 轮倒下了...';
    document.getElementById('final-round').textContent=S.round;
    // 延迟显示结算，让玩家先看战报
    document.getElementById('btn-start').disabled=true;
    setTimeout(()=>{
        document.getElementById('game-over').classList.add('show','lose');
    }, 2000);
}

function closeReward() {
    document.getElementById('reward-panel').classList.remove('show');
    document.getElementById('btn-start').disabled=false;
    // 如果背包有装备，提示玩家
    if(S.player && S.player.inventory && S.player.inventory.length>0) {
        addLog('<span class="log-system">📦 背包有 '+S.player.inventory.length+' 件装备，请点击"装备"穿戴！</span>');
    }
}

function openEquipPanel() {
    updateEquipSlots();
    updateInventoryList();
    document.getElementById('equip-panel').classList.add('show');
    document.getElementById('equip-backdrop').classList.add('show');
}

function closeEquipPanel() {
    document.getElementById('equip-panel').classList.remove('show');
    document.getElementById('equip-backdrop').classList.remove('show');
}

function updateEquipSlots() {
    EQUIP_TYPES.forEach(type=>{
        const slot=document.getElementById('equip-slot-'+type+'-item');
        const equip=S.player.equipment[type];
        if(equip) {
            slot.textContent=equip.icon+equip.name.split(' Lv.')[0]+' +'+getEquipValue(equip);
            slot.className='equip-slot-item equipped';
            slot.style.color=EQUIP_QUALITY_COLOR[equip.quality];
        } else {
            slot.textContent='空';
            slot.className='equip-slot-item';
            slot.style.color='#888';
        }
    });
}

function updateInventoryList() {
    const list=document.getElementById('equip-inv-list');
    document.getElementById('inv-count').textContent=S.player.inventory.length;
    if(S.player.inventory.length===0) {
        list.innerHTML='<div style="color:#666;font-size:0.9em;text-align:center;padding:20px;">背包空空~战斗可掉落装备</div>';
        return;
    }
    list.innerHTML=S.player.inventory.map((e,i)=>
        '<div class="equip-inv-item">'+
            '<span class="equip-inv-item-name" style="color:'+EQUIP_QUALITY_COLOR[e.quality]+'">'+e.icon+e.name+' +'+getEquipValue(e)+'</span>'+
            '<button class="equip-inv-item-btn" onclick="equipItem('+i+')">穿戴</button>'+
        '</div>'
    ).join('');
}

function equipItem(invIndex) {
    const item=S.player.inventory[invIndex];
    if(!item) return;
    const type=item.type;
    // 如果已有装备，穿上的装备放回背包
    if(S.player.equipment[type]) {
        S.player.inventory.push(S.player.equipment[type]);
    }
    S.player.equipment[type]=item;
    S.player.inventory.splice(invIndex,1);
    calcPlayerStats();
    S.player.hp=Math.min(S.player.maxHp,S.player.hp);
    updateEquipSlots();
    updateInventoryList();
    updateUI();
    addLog('<span class="log-player">📦 穿戴 '+item.icon+item.name+' ['+EQUIP_QUALITY[item.quality]+']</span>');
}

function unequipItem(type) {
    const item=S.player.equipment[type];
    if(!item) return;
    S.player.inventory.push(item);
    S.player.equipment[type]=null;
    calcPlayerStats();
    S.player.hp=Math.min(S.player.maxHp,S.player.hp);
    updateEquipSlots();
    updateInventoryList();
    updateUI();
    addLog('<span class="log-player">📦 卸下 '+item.icon+item.name+'</span>');
}

function restartGame() {
    document.getElementById('game-over').classList.remove('show','lose','win');
    document.getElementById('battle-log').innerHTML='';
    initState();
    showWelcomeLobster();
    document.getElementById('btn-start').disabled=false;
    document.getElementById('welcome-panel').classList.add('show');
    updateUI();
}

function closeWelcome() {
    document.getElementById('welcome-panel').classList.remove('show');
    document.getElementById('btn-start').disabled=false;
}

function selectMode(mode) {
    document.getElementById('mode-select-panel').style.display='none';
    if(mode==='raise') {
        // 养虾模式
        S.lobsterMode='raise';
        initState();
        showWelcomeLobster();
        document.getElementById('welcome-panel').classList.add('show');
    } else if(mode==='import') {
        // 成虾导入模式
        S.lobsterMode='import';
        initState();
        document.getElementById('import-panel').classList.add('show');
        document.getElementById('import-code').value='';
        document.getElementById('import-error').style.display='none';
    }
    updateUI();
}

function confirmImport() {
    const code=document.getElementById('import-code').value.trim();
    const errorEl=document.getElementById('import-error');
    if(!code) {
        errorEl.textContent='请输入龙虾代码';
        errorEl.style.display='block';
        return;
    }
    const imported=importLobster(code);
    if(imported) {
        document.getElementById('import-panel').classList.remove('show');
        S.inBattle=false;
        S.round=1;
        S.turn=0;
        S.phase=imported.phase||0;
        S.player=imported;
        S.playerCooldowns={};
        S.enemyCooldowns={};
        S.battleQueue=[];
        S.isProcessing=false;
        calcPlayerStats();
        updateUI();
        addLog('<span class="log-system">🦐 成虾导入成功! Lv.'+S.player.level+' '+PHASES[S.phase]+'</span>');
        document.getElementById('btn-start').disabled=false;
    } else {
        errorEl.textContent='无效的龙虾代码，请检查后重试';
        errorEl.style.display='block';
    }
}

function importLobster(code) {
    try {
        const decoded=atob(code);
        const data=JSON.parse(decoded);
        // 验证必要字段
        if(!data.skills || !data.level || data.phase===undefined) {
            return null;
        }
        // 计算导入龙虾的基础值（用于升级计算）
        const baseHp=(data.maxHp||100)-(data.level-1)*15;
        const baseAtk=(data.atk||10)-(data.level-1)*2;
        const baseDef=(data.def||4)-(data.level-1)*1;
        const baseSpd=(data.spd||6)-(data.level-1)*1;
        // 重建玩家数据
        return {
            name:data.name||'导入龙虾',
            level:data.level||1,
            hp:data.hp||data.maxHp||100,
            maxHp:data.maxHp||100,
            atk:data.atk||10,
            def:data.def||5,
            spd:data.spd||8,
            baseHp:baseHp,baseAtk:baseAtk,baseDef:baseDef,baseSpd:baseSpd,
            skills:data.skills.map(s=>cloneSkill(s)),
            buffs:[],shields:0,poisonDmg:0,alive:true,
            resurrected:false,stunned:false,sealed:false,
            speedBoosted:false,defReduced:false,
            resurrectRate:0,counterRate:0,reduceDmgRate:0,lifesteal:0,
            equipment:data.equipment||{atk:null,def:null,hp:null},
            inventory:data.inventory||[]
        };
    } catch(e) {
        return null;
    }
}

function exportLobster() {
    const data={
        name:S.player.name,
        level:S.player.level,
        hp:S.player.hp,
        maxHp:S.player.maxHp,
        atk:S.player.atk,
        def:S.player.def,
        spd:S.player.spd,
        phase:S.phase,
        skills:S.player.skills,
        equipment:S.player.equipment,
        inventory:S.player.inventory,
        baseHp:S.player.baseHp,
        baseAtk:S.player.baseAtk,
        baseDef:S.player.baseDef,
        baseSpd:S.player.baseSpd
    };
    return btoa(JSON.stringify(data));
}

function closeImportPanel() {
    document.getElementById('import-panel').classList.remove('show');
    document.getElementById('mode-select-panel').style.display='flex';
}

function closeExportPanel() {
    document.getElementById('export-panel').classList.remove('show');
    document.getElementById('btn-start').disabled=false;
}

function showExportPanel() {
    const code=exportLobster();
    document.getElementById('export-code').value=code;
    document.getElementById('export-panel').classList.add('show');
}

function copyExportCode() {
    const code=document.getElementById('export-code').value;
    navigator.clipboard.writeText(code).then(()=>{
        addLog('<span class="log-system">📋 成虾代码已复制到剪贴板!</span>');
    }).catch(()=>{
        document.getElementById('export-code').select();
        document.execCommand('copy');
        addLog('<span class="log-system">📋 成虾代码已复制到剪贴板!</span>');
    });
}

function showWelcomeLobster() {
    if(S.player && S.player.skills) {
        document.getElementById('welcome-sprite').textContent=PHASE_SPRITES[0];
        document.getElementById('welcome-sprite').className='lobster-reveal-sprite lobster-phase-0';
        document.getElementById('welcome-skills').textContent='技能: '+S.player.skills.map(s=>s.icon+s.name).join(' ');
    }
}

// 初始化
initState();
updateSpeedButton();
document.getElementById('mode-select-panel').style.display='flex';
updateUI();
addLog('<span class="log-system">⚡ 赛博斗龙虾 v1.74 准备就绪!</span>');
addLog('<span class="log-system">💡 选择游戏模式开始!</span>');
</script>
